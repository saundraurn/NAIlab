)" class="textarea textarea-bordered flex-1 text-sm resize-none min-h-[42px] leading-normal bg-base-100/30 focus:outline-none focus:border-primary/60 transition-colors" rows="1" style="overflow-y:hidden;height:42px"></textarea><toggle-btn :model-value="generating" icon="send" icon-off="stop" active-class="btn-error" inactive-class="btn-primary" :disabled="!generating && !hasApiKey" size="btn-square shrink-0 transition-colors shadow-sm" @update:model-value="generating ? abort() : doSend()"></toggle-btn></div></div></template></split-pane><teleport to="body"><transition name="fade"><div v-if="lightboxSrc" class="fixed inset-0 z-[500] flex flex-col items-center justify-center p-6" style="background:rgba(5,4,3,0.93);backdrop-filter:blur(6px)" @click.self="lightboxSrc = null"><icon-btn icon="close" @click="lightboxSrc = null" class="absolute top-4 right-4 text-neutral-300 hover:text-white hover:bg-white/10" style="z-index:1" circle/><img :src="lightboxSrc" class="max-w-[94vw] max-h-[80vh] object-contain rounded-2xl shadow-2xl ring-1 ring-white/10" @click.stop><div class="flex gap-3 mt-5"><button @click="downloadImage(lightboxSrc)" class="btn btn-sm gap-1.5 bg-white/10 text-white border-white/15 hover:bg-white/20"><material-icon icon="download" :size="15"/>Download </button></div></div></transition></teleport>`
        };
        const ConflictResolutionModal = {
            setup() {
                const syncStore = useSyncStore();
                const { pendingConflict, syncStatus, resolveConflict } = syncStore;
                const SECTIONS = _CONFLICT_SECTIONS;
                const choices = reactive({});
                const expanded = reactive({});
                watch(pendingConflict, (conflict) => {
                    if (!conflict) return;
                    SECTIONS.forEach(({ key }) => {
                        const localTime = conflict.local?._syncMeta?.[key]?.updatedAt || 0;
                        const remoteTime = conflict.remote?._syncMeta?.[key]?.updatedAt || 0;
                        choices[key] = remoteTime >= localTime ? 'remote' : 'local';
                    });
                }, { immediate: true });
                const setAll = (side) => SECTIONS.forEach(({ key }) => choices[key] = side);
                const isConflicted = (key) => {
                    if (!pendingConflict.value) return false;
                    return (pendingConflict.value.conflictKeys || []).includes(key) || !_.isEqual(pendingConflict.value.local?.[key], pendingConflict.value.remote?.[key]);
                };
                const apply = () => {
                    const conflict = pendingConflict.value; if (!conflict) return;
                    const resolved = _.fromPairs(SECTIONS.map(({ key }) => [key, _.cloneDeep(conflict[choices[key]]?.[key] || conflict.local[key])]));
                    const appStore = useAppStore();
                    if (resolved.app) resolved.app.apiKey = appStore.config.value.app.apiKey;
                    resolveConflict(resolved);
                };
                const cancel = () => { syncStore.pendingConflict.value = null; syncStore.syncStatus.value = 'idle'; };
                const redactedJson = (obj) => {
                    if (!obj) return '';
                    const clone = _.cloneDeepWith(obj, (val, key) =>
                        typeof key === 'string' && /apiKey|secret|token/i.test(key) ? '••••••••' : undefined
                    );
                    return JSON.stringify(clone, null, 2);
                };
                return { pendingConflict, syncStatus, SECTIONS, choices, expanded, setAll, isConflicted, apply, cancel, fmtAgo, redactedJson };
            },
            template: `<teleport to="body"><transition name="fade"><div v-if="syncStatus === 'conflict' && pendingConflict" class="fixed inset-0 z-[900] flex-center p-4" style="background:rgba(5,4,16,0.85);backdrop-filter:blur(8px)"><div class="bg-base-200 border border-white/10 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col"><div class="flex items-center gap-3 p-5 border-b border-white/10 shrink-0"><div class="w-10 h-10 rounded-xl bg-warning/15 border border-warning/25 flex-center shrink-0"><material-icon icon="sync_problem" :size="22" class="text-warning"/></div><div class="flex-1 min-w-0"><h3 class="font-bold text-neutral-100 text-base">Sync Conflict Detected</h3><p class="text-xs text-neutral-500 mt-0.5">Remote changes differ from your local settings. Choose which version to keep per section.</p></div><div class="flex gap-2 shrink-0"><button @click="setAll('local')" class="btn btn-ghost btn-xs btn-wborder text-neutral-400 hover:text-white">Use All Local</button><button @click="setAll('remote')" class="btn btn-ghost btn-xs btn-wborder text-neutral-400 hover:text-white">Use All Remote</button></div></div><div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-2"><template v-for="sec in SECTIONS" :key="sec.key"><div v-if="isConflicted(sec.key)" class="glass-nested rounded-xl border border-white/10 overflow-hidden"><button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/5 transition-colors text-left" @click="expanded[sec.key] = !expanded[sec.key]"><material-icon :icon="sec.icon" :size="18" class="text-neutral-400 shrink-0"/><span class="flex-1 text-sm font-semibold text-neutral-200">{{ sec.label }}</span><span class="badge badge-warning badge-xs font-semibold uppercase tracking-wide mr-1">Conflict</span><material-icon :icon="expanded[sec.key] ? 'expand_less' : 'expand_more'" :size="16" class="text-neutral-500 shrink-0"/></button><div class="px-4 pb-3 space-y-2"><label v-for="side in ['local', 'remote']" :key="side" class="flex items-start gap-3 p-2.5 rounded-xl cursor-pointer transition-colors" :class="choices[sec.key] === side ? (side==='local' ? 'bg-primary/10 border border-primary/30' : 'bg-secondary/10 border border-secondary/30') : 'bg-white/3 border border-white/5 hover:bg-white/5'"><input type="radio" :name="'sec-'+sec.key" :value="side" v-model="choices[sec.key]" class="radio radio-xs mt-0.5 shrink-0" :class="side==='local' ? 'radio-primary' : 'radio-secondary'"><div class="flex-1 min-w-0"><div class="flex-row-gap"><span class="text-xs font-bold uppercase tracking-wide" :class="side==='local' ? 'text-primary' : 'text-secondary'">{{ side }}</span><span class="text-xs text-neutral-500 font-mono">{{ fmtAgo(pendingConflict[side]?._syncMeta?.[sec.key]?.updatedAt) }}</span><span v-if="(pendingConflict[side]?._syncMeta?.[sec.key]?.updatedAt || 0) >= (pendingConflict[side==='local'?'remote':'local']?._syncMeta?.[sec.key]?.updatedAt || 0)" class="badge badge-xs badge-ghost text-neutral-500">newer</span></div><p v-if="pendingConflict[side]?.[sec.key]" class="text-xs text-neutral-400 mt-1 font-mono truncate">{{ sec.previewFn(pendingConflict[side][sec.key]) }}</p></div></label></div><transition name="fade"><div v-if="expanded[sec.key]" class="px-4 pb-3 border-t border-white/5 pt-3"><div class="grid grid-cols-2 gap-2"><div v-for="side in ['local','remote']" :key="side" class="bg-base-300/50 rounded-lg p-2.5"><p class="text-xs font-bold uppercase tracking-wide mb-1.5" :class="side==='local' ? 'text-primary' : 'text-secondary'">{{ side }}</p><pre class="text-[10px] text-neutral-400 font-mono leading-relaxed overflow-auto max-h-40 custom-scroll">{{ redactedJson(pendingConflict[side]?.[sec.key]) }}</pre></div></div></div></transition></div><div v-else class="flex items-center gap-3 px-4 py-2.5 glass-nested rounded-xl border border-white/5 opacity-50"><material-icon :icon="sec.icon" :size="16" class="text-neutral-500 shrink-0"/><span class="text-xs text-neutral-500 flex-1">{{ sec.label }}</span><span class="flex items-center gap-1 text-xs text-success"><material-icon icon="check_circle" :size="14"/>In sync</span></div></template></div><div class="p-4 border-t border-white/10 flex items-center gap-3 shrink-0 justify-end"><button @click="cancel" class="btn btn-ghost btn-sm btn-wborder">Cancel</button><button @click="apply" class="btn btn-sm btn-primary gap-2"><material-icon icon="check" :size="16"/>Apply & Push </button></div></div></div></transition></teleport>`
        };
        const _SYNCED_ITEMS = _CONFLICT_SECTIONS.map(s => ({icon: s.icon, label: s.label}));
        const _NOT_SYNCED_ITEMS = ['UI layout & panel states','Session state','Gen history','Nano Banana params (per-chat)'];
        const Settings = {
            setup() {
                const appStore = useAppStore();
                const syncStore = useSyncStore();
                const {app, gemini, jssync} = appStore.config.value;
                const syncToken = appStore.syncToken;
                const { isSyncing, syncStatus, syncError } = syncStore;
                const isCreatingGist = ref(false);
                const statusMeta = computed(() => {
                    const m = {
                        idle: { icon: 'cloud_done', color: 'text-success', text: jssync.lastSyncedAt ? `Last synced ${fmtAgo(jssync.lastSyncedAt)}` : 'Never synced' },
                        pulling: { icon: 'cloud_download', color: 'text-info', text: 'Pulling from Gist...' },
                        pushing: { icon: 'cloud_upload', color: 'text-info', text: 'Pushing to Gist...' },
                        conflict: { icon: 'sync_problem', color: 'text-warning', text: 'Conflict — resolve below' },
                        error: { icon: 'cloud_off', color: 'text-error', text: syncError.value || 'Sync error' }
                    };
                    return m[syncStatus.value] || m.idle;
                });
                const handleCreateGist = async () => {
                    if (!syncToken.value) return toast.err('Enter your GitHub PAT first.', 'sync');
                    isCreatingGist.value = true;
                    try { await syncStore.createAndSetGist(); } finally { isCreatingGist.value = false; }
                };
                const handleSyncNow = () => {
                    if (!syncToken.value) return toast.err('Configure sync first.', 'sync');
                    if (!jssync.gistId) return toast.err('No Gist ID. Create or enter one.', 'sync');
                    syncStore.syncNow();
                };
                return { app, gemini, jssync, syncToken, models, isSyncing, syncStatus, syncError, statusMeta, isCreatingGist, handleCreateGist, handleSyncNow,
                    syncedItems: _SYNCED_ITEMS, notSyncedItems: _NOT_SYNCED_ITEMS };
            },
            template:`<div class="max-w-4xl mx-auto p-4 space-y-4 h-full custom-scroll"><collapsible-panel title="API Configuration" storage-key="api-config"><div class="pt-2 space-y-5"><setting-input type="password" v-model="app.apiKey" label="NovelAI API Key" help-text="Stored locally in your browser."></setting-input><setting-input type="password" v-model="gemini.apiKey" label="Vertex AI API Key" placeholder="AIzaSy..." help-text="Get a key from &lt;a href='https://console.cloud.google.com/apis/credentials' target='_blank' class='text-primary hover:underline'&gt;Google Cloud Console → APIs &amp; Services → Credentials&lt;/a&gt;. Stored locally."></setting-input></div></collapsible-panel><collapsible-panel title="Application Settings" storage-key="app-settings"><div class="pt-2"><setting-input v-model="app.model" label="NovelAI Model" type="select" :options="models"></setting-input></div></collapsible-panel><collapsible-panel storage-key="sync-settings"><template #header><span class="flex-row-gap"><material-icon icon="cloud_sync" :size="20" class="text-primary/80 shrink-0"/><span>Cross-Browser Config Sync</span></span><span v-if="syncToken && jssync.gistId" class="flex items-center gap-1.5 ml-1 shrink-0"><spin-icon :loading="isSyncing" :icon="statusMeta.icon" :size="16" :class="isSyncing ? 'text-info' : statusMeta.color"></spin-icon><span class="text-xs font-medium" :class="statusMeta.color">{{ statusMeta.text }}</span></span></template><template #actions><button @click.stop="handleSyncNow" :disabled="isSyncing || !syncToken || !jssync.gistId" class="btn btn-ghost btn-xs btn-wborder gap-1" title="Sync Now"><spin-icon :loading="isSyncing" icon="sync" :size="14"></spin-icon><span>Sync Now</span></button></template><div class="pt-1 space-y-4"><div class="alert bg-primary/8 border border-primary/15 text-sm gap-2 py-2.5"><material-icon icon="info" :size="18" class="text-primary/70 shrink-0"/><div class="text-xs text-neutral-400 leading-relaxed"> Sync your settings across browsers using a private <strong class="text-neutral-300">GitHub Gist</strong>. Requires a GitHub account and a Personal Access Token scoped to <code class="text-primary/80">gist</code> only. <a href="https://github.com/settings/tokens/new?scopes=gist&description=NAILab+Sync" target="_blank" class="text-primary hover:underline ml-1">Create PAT ↗</a></div></div><setting-input type="password" v-model="syncToken" label="GitHub Personal Access Token" placeholder="github_pat_..." help-text="Stored locally only. Never synced to Gist."></setting-input><div class="relative"><floating-label label="Gist ID"/><div class="flex gap-2 mt-1"><input v-model="jssync.gistId" placeholder="e.g. a1b2c3d4e5f6..." class="input input-sm input-bordered flex-1 pt-2 text-sm font-mono"><button @click="handleCreateGist" :disabled="isCreatingGist || !syncToken" class="btn btn-sm btn-secondary gap-1 shrink-0" title="Create new private Gist automatically"><spin-icon :loading="isCreatingGist" icon="add" :size="14"></spin-icon><span>New</span></button></div><p class="text-xs text-neutral-600 mt-1 ml-1">Leave blank and click "New" to create one automatically.</p></div><div class="space-y-2"><setting-input type="text" v-model="jssync.proxyUrl" label="Cloudflare Worker URL (Image Proxy)" label-color="badge-ghost" placeholder="https://my-worker.workers.dev"></setting-input><p class="text-xs text-neutral-600 ml-1">Used to proxy Danbooru images through your worker. API/JSON calls go direct. Leave blank to load images without a proxy (may not work in all browsers).</p></div><div class="flex flex-wrap gap-x-6 gap-y-2 py-1"><label class="flex-row-gap cursor-pointer"><input type="checkbox" v-model="jssync.autoSync" class="toggle toggle-xs toggle-primary"><span class="text-sm text-neutral-300">Auto-sync on changes</span><span class="text-xs text-neutral-600">(1 min debounce)</span></label></div><div class="glass-nested rounded-xl p-3 space-y-1"><p class="text-xs font-semibold text-neutral-400 uppercase tracking-widest mb-2">What's synced</p><div class="grid grid-cols-2 gap-x-4 gap-y-1"><div v-for="item in syncedItems" :key="item.label" class="flex items-center gap-1.5 text-xs text-neutral-500"><material-icon :icon="item.icon" :size="12" class="text-success/70"/><span>{{ item.label }}</span></div></div><div class="divider my-1 text-xs text-neutral-600">not synced</div><div class="flex flex-wrap gap-x-4 gap-y-0.5"><span v-for="item in notSyncedItems" :key="item" class="flex items-center gap-1 text-xs text-neutral-600"><material-icon icon="remove" :size="10"/>{{item}}</span></div></div></div></collapsible-panel></div>`
        };
        const routes = [
            {path:'/', redirect:'/tagtest'},
            {path:'/gen', component:NAIImageGenerator, name:'gen', meta:{genSource:'gen'}},
            {path:'/tagtest', component:NAITagTest, name:'tagTest', meta:{genSource:'tagTest'}},
            {path:'/danbooru', component:DanbooruBrowser, children:[{path:'', component:DanbooruGrid, name:'danbooru-grid'},{path:':id(\\d+)', component:DanbooruGrid, name:'danbooru-single'},{path:'folder/:folderId', component:DanbooruGrid, name:'danbooru-folder'}]},
            {path:'/settings', component:Settings, name:'settings'},
            {path:'/banana', component:NanoBanana, name:'banana', meta:{genSource:'banana'}}
        ];
        const router = createRouter({history:createWebHashHistory(), routes, scrollBehavior:(to,from,savedPos)=>savedPos||{top:0,behavior:'smooth'}});
        const App = {
            setup() {
                const {notifications, resetNotificationNum, config, syncToken} = useAppStore();
                const syncStore = useSyncStore();
                const navItems = computed(() => [
                    {path:'/gen', icon:'image', label:'NAI Image Generator', source: 'gen'},
                    {path:'/tagtest', icon:'lab_research', label:'NAI Tag Test', source: 'tagTest'},
                    {path:'/banana', icon:'auto_awesome', label:'Nano Banana', source: 'banana'},
                    {path: config.value.danbooru.lastPath || '/danbooru', icon:'package_2', label:'Danbooru Browser', source: 'danbooru'}
                ]);
                useRouter().afterEach((to) => {
                    if (to.meta.genSource) resetNotificationNum(to.meta.genSource);
                });
                onMounted(async () => {
                    const jssync = config.value.jssync;
                    const imageStore = useImageStore();
                    const geminiAPI = useGeminiAPI();
                    if (syncToken.value && jssync.gistId) {
                        syncStore.pull().catch(() => {});
                    }
                    await imageStore.init();
                    await geminiAPI.initFromStorage();
                    imageStore.cleanupOrphanedImages(geminiAPI.savedConversations.value).catch(() => {});
                    watch(
                        () => {
                            const c = config.value;
                            return [
                                c.tagTest, c.genConfig, c.genState,
                                c.app.model,
                                c.danbooru
                            ];
                        },
                        useDebounceFn(() => {
                            const js = config.value.jssync;
                            if (!js.autoSync || !syncToken.value || !js.gistId) return;
                            if (syncStore.syncStatus.value === 'conflict') return;
                            syncStore.syncNow();
                        }, 60000),
                        { deep: true }
                    );
                });
                return {navItems, notifications, syncStatus: syncStore.syncStatus};
            },
            template:`<div class="flex h-screen animated-bg animate-gradientShift"><nav class="z-50 p-2 glass border-r-0 flex flex-col"><ul class="menu bg-transparent rounded-box p-0 space-y-2"><li v-for="item in navItems" :key="item.path"><nav-link :to="item.path" :icon="item.icon" :label="item.label" :notification="notifications[item.source]"></nav-link></li></ul><ul class="menu bg-transparent rounded-box p-0 mt-auto pt-2 border-t border-white/10"><li><div class="indicator p-0 flex-center w-14 h-14"><span v-if="syncStatus === 'conflict'" class="indicator-item badge badge-warning badge-xs">!</span><span v-else-if="syncStatus === 'error'" class="indicator-item badge badge-error badge-xs">!</span><nav-link to="/settings" icon="settings"></nav-link></div></li></ul></nav><main class="flex-1 overflow-hidden"><router-view v-slot="{Component}"><keep-alive><component :is="Component" /></keep-alive></router-view></main><toast-container></toast-container><conflict-resolution-modal></conflict-resolution-modal></div>`
        };
        const app = createApp(App);
        _.forOwn({MaterialIcon, FloatingLabel, TagCountBadge, ChecklistDropdown, TagPill, IconBtn, ToggleBtn, SettingInput, Counter, SegmentedControl, SplitPane, LazyImage, HoverCard, ImagePreviewCard, AutocompleteField, CollapsiblePanel, PromptList, GenerationSettingsPanel, Placeholder, ToastContainer, FolderDropdown, NavLink, HiddenBadge, SpinIcon, ChatMessage, ConvoListItem, NanoBanana, ConflictResolutionModal}, (c, n) => app.component(n, c));
        app.use(router);
app.mount('#app');
window.__VUE_APP_MOUNTED__ = true;</script>
