<body>
    <div id="app"></div>

    <script>
        // Handle Box OAuth redirect
        if (window.location.search.includes('code=')) {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code && window.opener) {
                window.opener.postMessage({ type: 'box-oauth-code', code }, window.location.origin);
                window.close();
            }
        }
    </script>
    <script>
        const {createApp, ref, shallowRef, reactive, computed, onMounted, watch, nextTick, toRefs, toRef, provide, inject, onActivated, onDeactivated, onBeforeUnmount, getCurrentInstance, onScopeDispose} = Vue;
        const {createRouter, createWebHashHistory, useRoute, useRouter} = VueRouter;
        const {useLocalStorage, useSessionStorage, useFetch, createGlobalState, useAsyncState, useDebounceFn, onKeyStroke, useInfiniteScroll, useTextareaAutosize, useScroll, onClickOutside, useEventListener} = VueUse;
        
        const OPUS_DIMENSIONS=Object.freeze([[1024,1024],[960,1088],[1088,960],[896,1152],[1152,896],[832,1216],[1216,832],[768,1344],[1344,768],[704,1472],[1472,704],[640,1600],[1600,640],[576,1792],[1792,576],[512,2048],[2048,512]].map(([width,height])=>({width,height})));
        const DANBOORU_LIMIT = 100;
        const formatDisplayNum = (num) => num >= 1e6 ? +(num/1e6).toFixed(1)+'m' : num >= 1e3 ? +(num/1e3).toFixed(1)+'k' : (num || 0);
        const updateItemNum = (list, idRef, inc, max = 10) => inc > 0 && list.length < max ? list.push({id: idRef.value++, val: ''}) : inc < 0 && list.length > 1 && list.pop();
        const parsePrompt = (txt) => { const [p, n] = (txt || '').split('--'); return {positive: (p || '').trim(), negative: (n || '').trim()}; };
        const prepareGenConfig = (cfg) => (!cfg.isOpus || !cfg.shouldUseRandomOpusDimensions) ? {...cfg} : {...cfg, ..._.sample(OPUS_DIMENSIONS.filter(d => d.width <= cfg.width && d.height <= cfg.height))};

        // --- Global Utilities ---
        const uid = () => crypto.randomUUID();
        const imgSrc = (img) => img ? `data:${img.mimeType};base64,${img.data}` : '';
        const fmtTokens = (n) => !n ? '0' : n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
        const markdownCache = new Map();
        const markdownParse = (text) => {
            if (!text) return '';
            if (markdownCache.has(text)) return markdownCache.get(text);
            try { const r = window.marked ? window.marked.parse(text) : text; markdownCache.set(text, r); return r; } catch { return text; }
        };
        const readBase64 = (file) => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res({data: r.result.split(',')[1], mimeType: file.type, name: file.name}); r.onerror = rej; r.readAsDataURL(file); });
        const downloadImage = (src, name) => { const a = document.createElement('a'); a.href = src; a.download = name || 'gemini-'+Date.now()+'.png'; document.body.appendChild(a); a.click(); a.remove(); };

        let webpWorker = null;
        const getWebPWorker = () => {
            if (!webpWorker) {
                const workerCode = `
                    import { encode } from 'https://esm.sh/@jsquash/webp?bundle';
                    self.onmessage = async (e) => {
                        const { id, bitmap, quality } = e.data;
                        try {
                            const canvas = new OffscreenCanvas(bitmap.width, bitmap.height);
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(bitmap, 0, 0);
                            const imageData = ctx.getImageData(0, 0, bitmap.width, bitmap.height);
                            bitmap.close();
                            const resultBuffer = await encode(imageData, { effort: 6, quality: quality || 100 });
                            self.postMessage({ id, buffer: resultBuffer }, [resultBuffer]);
                        } catch (err) {
                            try { bitmap.close(); } catch (_) {}
                            self.postMessage({ id: e.data.id, error: err.message });
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                webpWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
                webpWorker._callbacks = new Map();
                webpWorker.onmessage = (e) => {
                    const { id, buffer, error } = e.data;
                    const cb = webpWorker._callbacks.get(id);
                    if (cb) {
                        webpWorker._callbacks.delete(id);
                        if (error) cb.reject(new Error(error));
                        else cb.resolve(buffer);
                    }
                };
            }
            return webpWorker;
        };

        const convertBlobToWebP = async (blob, quality = 100) => {
            const bitmap = await createImageBitmap(blob);
            const worker = getWebPWorker();
            const id = Date.now() + '_' + Math.random();
            return new Promise((resolve, reject) => {
                worker._callbacks.set(id, {
                    resolve: async (buffer) => {
                        const webpBlob = new Blob([buffer], { type: 'image/webp' });
                        const reader = new FileReader();
                        reader.onload = () => resolve({ data: reader.result.split(',')[1], mimeType: 'image/webp', name: 'image.webp', blob: webpBlob });
                        reader.onerror = reject;
                        reader.readAsDataURL(webpBlob);
                    },
                    reject
                });
                worker.postMessage({ id, bitmap, quality }, [bitmap]);
            });
        };

        const convertBase64ToWebP = async (base64, mimeType = 'image/png', quality = 100) => {
            const r = await fetch(`data:${mimeType};base64,${base64}`);
            const blob = await r.blob();
            return await convertBlobToWebP(blob, quality);
        };
        const abortableSleep = (ms, signal) => new Promise((resolve, reject) => {
            if (signal?.aborted) return reject(new DOMException('', 'AbortError'));
            const t = setTimeout(resolve, ms);
            signal?.addEventListener('abort', () => { clearTimeout(t); reject(new DOMException('', 'AbortError')); }, {once: true});
        });

        // --- Box API Service ---
        const useBoxAPI = createGlobalState(() => {
            const FOLDER_NAME = 'NAIlabData';
            const CONFIG_FILE_NAME = 'appConfig.json';
            const HISTORY_FILE_NAME = 'appHistory.json';
            
            const isReady = ref(false);
            const isValidating = ref(false);
            let refreshPromise = null;

            const refreshAccessToken = async () => {
                const store = useAppStore();
                const { clientId, clientSecret, refreshToken } = store.config.value.box;
                if (!clientId || !clientSecret || !refreshToken) return false;
                
                try {
                    const res = await fetch('https://api.box.com/oauth2/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            grant_type: 'refresh_token',
                            refresh_token: refreshToken,
                            client_id: clientId,
                            client_secret: clientSecret
                        })
                    });
                    if (!res.ok) throw new Error('Failed to refresh token');
                    const data = await res.json();
                    store.config.value.box.accessToken = data.access_token;
                    store.config.value.box.refreshToken = data.refresh_token;
                    store.config.value.box.tokenExpiresAt = Date.now() + (data.expires_in * 1000);
                    isReady.value = true;
                    return true;
                } catch (e) {
                    console.error('Box refresh error:', e);
                    isReady.value = false;
                    return false;
                }
            };

            const startOAuthFlow = () => {
                const store = useAppStore();
                const { clientId } = store.config.value.box;
                if (!clientId) {
                    store.addToast({msg: 'Please enter Box Client ID first.', type: 'error'});
                    return;
                }
                
                const redirectUri = window.location.origin + window.location.pathname;
                const authUrl = `https://account.box.com/api/oauth2/authorize?response_type=code&client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}`;
                
                const popup = window.open(authUrl, 'BoxAuth', 'width=600,height=800');
                
                const messageListener = async (event) => {
                    if (event.origin !== window.location.origin) return;
                    if (event.data?.type === 'box-oauth-code') {
                        window.removeEventListener('message', messageListener);
                        const code = event.data.code;
                        try {
                            const res = await fetch('https://api.box.com/oauth2/token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({
                                    grant_type: 'authorization_code',
                                    code,
                                    client_id: clientId,
                                    client_secret: store.config.value.box.clientSecret,
                                    redirect_uri: redirectUri
                                })
                            });
                            if (!res.ok) throw new Error('Failed to exchange code for token');
                            const data = await res.json();
                            store.config.value.box.accessToken = data.access_token;
                            store.config.value.box.refreshToken = data.refresh_token;
                            store.config.value.box.tokenExpiresAt = Date.now() + (data.expires_in * 1000);
                            store.addToast({msg: 'Box connected successfully!', type: 'success'});
                            await validateToken();
                        } catch (e) {
                            console.error('Box OAuth error:', e);
                            store.addToast({msg: 'Failed to authenticate with Box.', type: 'error'});
                        }
                    }
                };
                window.addEventListener('message', messageListener);
            };

            const validateToken = async () => {
                const store = useAppStore();
                const { accessToken, tokenExpiresAt } = store.config.value.box;
                if (!accessToken) {
                    isReady.value = false;
                    return false;
                }
                
                if (Date.now() >= (tokenExpiresAt - 60000)) {
                    if (!refreshPromise) refreshPromise = refreshAccessToken();
                    const refreshed = await refreshPromise;
                    refreshPromise = null;
                    if (!refreshed) return false;
                }

                isValidating.value = true;
                try {
                    const res = await fetch('https://api.box.com/2.0/users/me', {
                        headers: { 'Authorization': `Bearer ${store.config.value.box.accessToken}` }
                    });
                    isReady.value = res.ok;
                    if (!res.ok) {
                        store.addToast({msg: 'Box API Token Expired or Invalid. Please log in again.', type: 'error'});
                    }
                    return res.ok;
                } catch (e) {
                    isReady.value = false;
                    return false;
                } finally {
                    isValidating.value = false;
                }
            };

            const _headers = () => {
                const store = useAppStore();
                const token = store.config.value.box?.accessToken;
                if (!isReady.value || !token) return { 'Content-Type': 'application/json' };
                return {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'};
            };

            const _fetch = async (url, options = {}) => {
                let res = await fetch(url, options);
                if (res.status === 401) {
                    if (!refreshPromise) refreshPromise = refreshAccessToken();
                    const refreshed = await refreshPromise;
                    refreshPromise = null;
                    if (refreshed) {
                        options.headers = _headers();
                        res = await fetch(url, options);
                    } else {
                        isReady.value = false;
                        const store = useAppStore();
                        store.addToast({msg: 'Box API Token Expired. Please reconnect in settings.', type: 'error', duration: 5000});
                        throw new Error('Unauthorized');
                    }
                }
                return res;
            };

            const findFolder = async (name) => {
                const res = await _fetch(`https://api.box.com/2.0/search?query=${name}&type=folder`, {headers: _headers()});
                if (!res.ok) throw new Error('Failed to search Box folders');
                const data = await res.json();
                return data.entries.find(e => e.name === name);
            };

            const createFolder = async (name) => {
                const res = await _fetch(`https://api.box.com/2.0/folders`, {
                    method: 'POST', headers: _headers(),
                    body: JSON.stringify({name, parent: {id: '0'}})
                });
                if (!res.ok) throw new Error('Failed to create Box folder');
                return await res.json();
            };

            let cachedFolderId = null;
            let cachedFileId = null;
            let lastToken = null;
            const getFolderId = async () => {
                if (!isReady.value) return null;
                const store = useAppStore();
                const currentToken = store.config.value.box?.developerToken;
                if (currentToken !== lastToken) {
                    cachedFolderId = null;
                    cachedFileId = null;
                    lastToken = currentToken;
                }
                if (cachedFolderId) return cachedFolderId;
                
                let folder = null;

                // Primary check: Items in root (synchronous, authoritative)
                const res = await _fetch(`https://api.box.com/2.0/folders/0/items`, {headers: _headers()});
                if (res.ok) {
                    const data = await res.json();
                    folder = data.entries.find(e => e.name === FOLDER_NAME && e.type === 'folder');
                }

                // Fallback to Search API
                if (!folder) {
                    try { folder = await findFolder(FOLDER_NAME); } catch (e) {}
                }
                
                if (!folder) folder = await createFolder(FOLDER_NAME);
                cachedFolderId = folder.id;
                return cachedFolderId;
            };

            const findFile = async (folderId, name) => {
                const res = await _fetch(`https://api.box.com/2.0/folders/${folderId}/items`, {headers: _headers()});
                if (!res.ok) throw new Error('Failed to list folder items');
                const data = await res.json();
                return data.entries.find(e => e.name === name && e.type === 'file');
            };

            let cachedConfigFileId = null;
            let cachedHistoryFileId = null;

            const loadState = async () => {
                if (!isReady.value) return null;
                try {
                    const folderId = await getFolderId();
                    const configFile = await findFile(folderId, CONFIG_FILE_NAME);
                    const historyFile = await findFile(folderId, HISTORY_FILE_NAME);
                    
                    let loadedConfig = {};
                    let loadedHistory = {};

                    if (configFile) {
                        cachedConfigFileId = configFile.id;
                        const configRes = await _fetch(`https://api.box.com/2.0/files/${configFile.id}/content`, {headers: _headers()});
                        if (configRes.ok) loadedConfig = await configRes.json();
                    }

                    if (historyFile) {
                        cachedHistoryFileId = historyFile.id;
                        const historyRes = await _fetch(`https://api.box.com/2.0/files/${historyFile.id}/content`, {headers: _headers()});
                        if (historyRes.ok) loadedHistory = await historyRes.json();
                    }

                    return { ...loadedConfig, ...loadedHistory };
                } catch (e) {
                    console.error('Box load error:', e);
                    const store = useAppStore();
                    store.addToast({msg: 'Failed to load from Box: ' + e.message, type: 'error'});
                    return null;
                }
            };

            const _uploadFile = async (folderId, fileId, fileName, dataObj) => {
                const store = useAppStore();
                const token = store.config.value.box.accessToken;
                // For history, remove _hydrated flag and stale blob urls before saving
                const dataStr = JSON.stringify(dataObj, (k, v) => {
                    if (k === '_hydrated') return undefined;
                    if (k === 'url' && typeof v === 'string' && v.startsWith('blob:')) return undefined;
                    return v;
                });
                const formData = new FormData();
                if (fileId) {
                    formData.append('attributes', JSON.stringify({name: fileName}));
                    formData.append('file', new Blob([dataStr], {type: 'application/json'}), fileName);
                    const res = await _fetch(`https://upload.box.com/api/2.0/files/${fileId}/content`, {
                        method: 'POST',
                        headers: {'Authorization': `Bearer ${token}`},
                        body: formData
                    });
                    if (!res.ok) throw new Error(`Failed to update Box file: ${fileName}`);
                    return fileId;
                } else {
                    formData.append('attributes', JSON.stringify({name: fileName, parent: {id: folderId}}));
                    formData.append('file', new Blob([dataStr], {type: 'application/json'}), fileName);
                    const res = await _fetch(`https://upload.box.com/api/2.0/files/content`, {
                        method: 'POST',
                        headers: {'Authorization': `Bearer ${token}`},
                        body: formData
                    });
                    if (!res.ok) throw new Error(`Failed to upload Box file: ${fileName}`);
                    const responseData = await res.json();
                    if (responseData.entries && responseData.entries.length > 0) {
                        return responseData.entries[0].id;
                    }
                    return null;
                }
            };

            let saveConfigTimeout = null;
            let saveHistoryTimeout = null;

            const saveConfig = async (configObj) => {
                if (!isReady.value) return;
                if (saveConfigTimeout) clearTimeout(saveConfigTimeout);
                
                saveConfigTimeout = setTimeout(async () => {
                    try {
                        const folderId = await getFolderId();
                        if (!cachedConfigFileId) {
                            const file = await findFile(folderId, CONFIG_FILE_NAME);
                            if (file) cachedConfigFileId = file.id;
                        }
                        cachedConfigFileId = await _uploadFile(folderId, cachedConfigFileId, CONFIG_FILE_NAME, configObj);
                        const storeInstance = useAppStore();
                        storeInstance.addToast({msg: 'Config saved to Box.', type: 'success', duration: 2000});
                    } catch (e) {
                        console.error('Box save config error:', e);
                        const storeInstance = useAppStore();
                        storeInstance.addToast({msg: 'Failed to sync config to Box: ' + e.message, type: 'warning'});
                    }
                }, 3000);
            };

            const saveHistory = async (historyObj) => {
                if (!isReady.value) return;
                if (saveHistoryTimeout) clearTimeout(saveHistoryTimeout);
                
                saveHistoryTimeout = setTimeout(async () => {
                    try {
                        const folderId = await getFolderId();
                        if (!cachedHistoryFileId) {
                            const file = await findFile(folderId, HISTORY_FILE_NAME);
                            if (file) cachedHistoryFileId = file.id;
                        }
                        cachedHistoryFileId = await _uploadFile(folderId, cachedHistoryFileId, HISTORY_FILE_NAME, historyObj);
                        const storeInstance = useAppStore();
                        storeInstance.addToast({msg: 'History saved to Box.', type: 'success', duration: 2000});
                    } catch (e) {
                        console.error('Box save history error:', e);
                        const storeInstance = useAppStore();
                        storeInstance.addToast({msg: 'Failed to sync history to Box: ' + e.message, type: 'warning'});
                    }
                }, 3000);
            };

            return { isReady, isValidating, validateToken, startOAuthFlow, loadState, saveConfig, saveHistory };
        });

        // --- Unified Application Store ---
        const useAppStore = createGlobalState(() => {
            const config = useLocalStorage('nai-app-settings', {
                tagTest: {iterations:1, isInfinite:false, isControl:true, prompts:[{id:1, val:'1girl, solo, wearing casual clothes'}], nextPromptId:2, unwantedContent:'multiple views, monochrome, black and white, looking at viewer, pov', tagsToTest:'sunset lighting\nwarm colors\nnight scene\nfog\nrain', tagPos:'beginning', tagTarget:'prompt', tagStrength:1.0, hasExtendedRange:false, areTagsVisible:false, shouldFilterMiddleResults:false},
                genConfig: {steps:28, width:768, height:1344, scale:5.7, sampler:'k_euler_ancestral', cfgRescale:0, noiseSchedule:'karras', skipCfgAboveSigma:0, isOpus:false, shouldUseRandomOpusDimensions:false},
                app: {apiKey:'', model:'nai-diffusion-4-5-full'},
                gemini: {apiKey:'', thinkingLevel:'MINIMAL', aspectRatio:'1:1', imageSize:'1K', autoRetry:false},
                box: {clientId: '', clientSecret: '', accessToken: '', refreshToken: '', tokenExpiresAt: 0},
                danbooru: {folders:[], nextFolderId:1, gridCols:4, lastPath:'/danbooru', blacklist:'', sortOrder:'id', ratingFilters:{g:true, s:true, q:true, e:true}, savedSearches:[{name:'Trending', prompt:'order:rank'}]},
                genState: {prompt:'1girl, solo, wearing casual clothes', uc:'multiple views, monochrome, black and white, looking at viewer, pov', charPrompts:[{id:1, val:''}], nextCharPromptId:2}
            }, {mergeDefaults: true});

            const uiConfig = useLocalStorage('nai-ui-settings', {
                splitSizes:[60,40], splitSizesDanbooru:[40,60], splitSizesGen:[40,60], splitSizesBanana:[100,0], 
                collapsibleStates:{'tag-test-settings':true, 'prompts-uc':true, 'tags-to-test':true, 'gen-settings':true, 'api-config':true, 'app-settings':true, 'img-comparison':true, 'results-panel':true, 'danbooru-search':true, 'danbooru-folders':true, 'nai-main-prompt':true, 'nai-char-prompts':true, 'nai-last-img':true, 'banana-settings':false}
            }, {mergeDefaults: true});

                                    <transition-group tag="div" name="list" class="space-y-2 mb-4"><div v-for="result in formattedResults" :key="result.name" class="flex items-center gap-2"><div class="w-20 text-neutral-100 text-sm truncate">{{result.name}}</div><div class="flex-1 rounded-full h-4 relative bg-neutral-800 overflow-hidden"><div :style="{width: result.score + '%'}" class="h-full bg-gradient-to-r from-warning to-primary transition-[width] duration-[400ms] ease-out"></div><div class="absolute inset-0 flex items-center justify-center text-neutral-100 text-xs font-medium">{{result.score}}%</div></div><div class="text-xs text-neutral-400">{{result.tests}} tests</div></div></transition-group>
                                    <div class="overflow-x-auto max-h-48 custom-scroll"><table class="table table-sm"><thead><tr><th>Tag</th><th>Score</th><th>W/L</th><th>Skips</th></tr></thead><tbody><tr v-for="result in formattedResults" :key="result.name"><td>{{result.name}}</td><td>{{result.score}}%</td><td>{{result.wins}}/{{result.losses}}</td><td>{{result.skips}}</td></tr></tbody></table></div>

                            </template>
                        </split-pane></div></div>`
        }
        
        // --- Gemini API Composable ---
        const CANDIDATE_BLOCK_REASONS = new Set(['SAFETY','IMAGE_SAFETY','IMAGE_PROHIBITED_CONTENT','PROHIBITED_CONTENT','RECITATION','IMAGE_RECITATION','OTHER','IMAGE_OTHER','NO_IMAGE','BLOCKLIST','SPII']);
        const TERMINAL_FINISH_REASONS = new Set(['LANGUAGE','MODEL_ARMOR']);

        const useGeminiAPI = createGlobalState(() => {
            const store = useAppStore();
            const conversations = toRef(store.largeData, 'conversations');
            const activeConversationId = ref(null);

            const getActiveConversation = () => conversations.value.find(c => c.id === activeConversationId.value);
            
            // Watch for conversation changes so activeConversationId doesn't get orphaned when cloud state loads
            watch(conversations, (newConvs) => {
                if (newConvs && newConvs.length > 0 && !newConvs.find(c => c.id === activeConversationId.value)) {
                    activeConversationId.value = newConvs[0].id;
                }
            }, { immediate: true, deep: true });

            const messages = computed(() => getActiveConversation()?.messages || []);
            const gallery = computed(() => getActiveConversation()?.gallery || []);

            const generating = ref(false);
            const generatingMsgId = ref(null);
            const abortCtrl = ref(null);
            const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview';

            const createVariant = () => reactive({id: uid(), parts: [], _thinking: '', _text: '', _images: [], _usage: null, _error: null, _blockReason: null, _isPromptBlock: false, timestamp: null});

            const getMsgParts = (msg) => {
                if (msg.role === 'model' && msg.variants) { const v = msg.variants[msg.activeVariant] ?? msg.variants[0]; return v ? v.parts : []; }
                const parts = [];
                for (const img of (msg.images || [])) { if (!img.hidden) parts.push({inlineData: {data: img.data, mimeType: img.mimeType}}); }
                if (msg.text) parts.push({text: msg.text});
                return parts;
            };
            const buildBody = (contents) => {
                const cfg = store.config.value.gemini;
                const genCfg = {responseModalities: ['TEXT','IMAGE'], thinkingConfig: {thinkingLevel: cfg.thinkingLevel, includeThoughts: cfg.thinkingLevel === 'HIGH'}};
                const imgCfg = {};
                if (cfg.aspectRatio && cfg.aspectRatio !== 'auto') imgCfg.aspectRatio = cfg.aspectRatio;
                if (cfg.imageSize) imgCfg.imageSize = cfg.imageSize;
                if (Object.keys(imgCfg).length) genCfg.imageConfig = imgCfg;
                return {contents, generationConfig: genCfg};
            };
            const getContents = (endIdx) => messages.value.slice(0, endIdx).filter(m => !m.hidden).map(m => ({role: m.role, parts: getMsgParts(m)}));

            const selectConversation = (id) => { activeConversationId.value = id; };
            const renameConversation = (id, newName) => {
                const c = conversations.value.find(c => c.id === id);
                if (c && newName.trim()) c.title = newName.trim();
            };
            const deleteConversation = (id) => {
                const idx = conversations.value.findIndex(c => c.id === id);
                if (idx !== -1) {
                    conversations.value.splice(idx, 1);
                    if (activeConversationId.value === id) activeConversationId.value = conversations.value[0]?.id || null;
                }
            };

            async function* parseSSE(res) {
                const reader = res.body.getReader(), dec = new TextDecoder(); let buf = '';
                while (true) {
                    const {done, value} = await reader.read(); if (done) break;
                    buf += dec.decode(value, {stream: true}); let idx;
                    while ((idx = buf.indexOf('\n')) !== -1) {
                        const line = buf.substring(0, idx).trim(); buf = buf.substring(idx + 1);
                        if (line.startsWith('data: ')) { const d = line.substring(6); if (d === '[DONE]') return; try { yield JSON.parse(d); } catch {} }
                    }
                }
            }
            const extractDisplay = (parts) => {
                let thinking = '', text = ''; const images = [];
                for (const p of parts) { if (p.thought && p.text) thinking += p.text; else if (p.text) text += p.text; if (p.inlineData) images.push({mimeType: p.inlineData.mimeType, data: p.inlineData.data}); }
                return {thinking, text, images};
            };

            const streamToVariant = async (msgId, varIdx, contents, promptTxt, originatingConvId) => {
                const conv = conversations.value.find(c => c.id === originatingConvId);
                const getV = () => messages.value.find(m => m.id === msgId)?.variants[varIdx];
                const res = await fetch(`${API_BASE}:streamGenerateContent?alt=sse`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','x-goog-api-key': store.config.value.gemini.apiKey},
                    body: JSON.stringify(buildBody(contents)), signal: abortCtrl.value.signal
                });
                if (!res.ok) {
                    const errData = await res.json().catch(() => null);
                    const msg = errData?.error?.message || `HTTP ${res.status}`;
                    const e = new Error(msg); e.status = res.status;
                    if ([429, 500, 502, 503, 504].includes(res.status)) e.isRetryable = true;
                    if (res.status === 400 && /quota|resource.?exhausted/i.test(msg)) e.isRetryable = true;
                    throw e;
                }

                for await (const chunk of parseSSE(res)) {
                    if (chunk.promptFeedback?.blockReason) {
                        const e = new Error(`Prompt blocked: ${chunk.promptFeedback.blockReason}`);
                        e.isPromptBlock = true; e.blockReason = chunk.promptFeedback.blockReason; throw e;
                    }
                    const cand = chunk.candidates?.[0];
                    if (cand?.content?.parts) for (const p of cand.content.parts) allParts.push(p);
                    if (cand?.finishReason) finalFinishReason = cand.finishReason;
                    const disp = extractDisplay(allParts), v = getV();
                    if (v) { v._thinking = disp.thinking; v._text = disp.text; v._images = disp.images; if (chunk.usageMetadata) v._usage = chunk.usageMetadata; }
                }
                if (CANDIDATE_BLOCK_REASONS.has(finalFinishReason)) { const e = new Error(`Output blocked: ${finalFinishReason}`); e.isCandidateBlock = true; e.blockReason = finalFinishReason; throw e; }
                if (TERMINAL_FINISH_REASONS.has(finalFinishReason)) { const e = new Error(`Generation stopped: ${finalFinishReason}`); e.isTerminal = true; e.blockReason = finalFinishReason; throw e; }
                const v = getV();
                if (!v?._images?.length) { const reason = finalFinishReason || 'EMPTY'; const e = new Error(v?._text ? `No image generated (${reason})` : `Empty response (${reason})`); e.isCandidateBlock = true; e.blockReason = reason; throw e; }
                if (v) { 
                    v.parts = allParts; 
                    v.timestamp = Date.now(); 
                    if (conv && conv.gallery) {
                        for (let i = 0; i < v._images.length; i++) {
                            const img = v._images[i];
                            // convert inline image data base64 string to WebP to save space
                            try {
                                const webp = await convertBase64ToWebP(img.data, img.mimeType);
                                conv.gallery.push({id: uid(), mimeType: webp.mimeType, data: webp.data, prompt: promptTxt, timestamp: Date.now()}); 
                                // update the variant as well
                                v._images[i] = { mimeType: webp.mimeType, data: webp.data };
                                // update the original part so it's not saved at full size in the conversation history
                                const partIdx = v.parts.findIndex(p => p.inlineData && p.inlineData.data === img.data);
                                if (partIdx !== -1) {
                                    v.parts[partIdx].inlineData = { mimeType: webp.mimeType, data: webp.data };
                                }
                            } catch (e) {
                                console.error('Failed to convert image to WebP:', e);
                                conv.gallery.push({id: uid(), mimeType: img.mimeType, data: img.data, prompt: promptTxt, timestamp: Date.now()}); 
                            }
                        }
                    }
                }
            };

            // Shared retry-loop error handler — returns true to continue, false to break
            const handleStreamError = async (err, v, retryCount, onNewVariant) => {
                if (err.name === 'AbortError') { if (v) { v._error = 'Request cancelled.'; v.timestamp = Date.now(); } return false; }
                if (err.isRetryable && retryCount.value < 6) {
                    retryCount.value++;
                    const delay = Math.min(Math.pow(2, retryCount.value) * 500 + Math.random() * 500, 30000);

                }
                if (err.isTerminal) { if (v) { v._error = `Stopped: ${err.blockReason}`; v._blockReason = err.blockReason; v.timestamp = Date.now(); } store.addToast({msg: `Generation stopped: ${err.blockReason}`, type: 'error'}); return false; }
                if (err.isPromptBlock) { if (v) { v._error = err.message; v._blockReason = err.blockReason; v._isPromptBlock = true; v.timestamp = Date.now(); } store.addToast({msg: err.message, type: 'error'}); return false; }
                if (err.isCandidateBlock) {
                    if (v) { v._error = err.message; v._blockReason = err.blockReason; v.timestamp = Date.now(); }
                    if (store.config.value.gemini.autoRetry) { store.addToast({msg: `Blocked (${err.blockReason}), retrying…`, type: 'warning', duration: 1500}); onNewVariant(); retryCount.value = 0; return true; }
                    return false;
                }
                if (v) { v._error = err.message || 'Unknown error'; v.timestamp = Date.now(); }
                store.addToast({msg: err.message || 'Generation failed', type: 'error'}); return false;
            };

            const sendMessage = async (text, imgs, scrollFn) => {
                if (!text && !imgs.length) return;
                if (!store.config.value.gemini?.apiKey) { store.addToast({msg: 'Set your Gemini API key in Settings', type: 'error'}); return; }
                if (generating.value) return;
                const originatingConvId = activeConversationId.value;
                const userMsg = reactive({id: uid(), role: 'user', images: imgs.map(i => ({id: uid(), data: i.data, mimeType: i.mimeType, name: i.name, hidden: false})), text: text || '', hidden: false, timestamp: Date.now()});

                const modelMsg = reactive({id: uid(), role: 'model', hidden: false, variants: [createVariant()], activeVariant: 0});
                messages.value.push(modelMsg);
                abortCtrl.value = new AbortController();
                generating.value = true; generatingMsgId.value = modelMsg.id; scrollFn?.();

                }
                generating.value = false; generatingMsgId.value = null; abortCtrl.value = null; scrollFn?.();
            };

            const regenerateMessage = async (msgId) => {
                const msg = messages.value.find(m => m.id === msgId);
                if (!msg || msg.role !== 'model' || generating.value) return;
                if (!store.config.value.gemini?.apiKey) { store.addToast({msg: 'Set your Gemini API key first', type: 'error'}); return; }
                const originatingConvId = activeConversationId.value;
                msg.variants.push(createVariant()); msg.activeVariant = msg.variants.length - 1;
                abortCtrl.value = new AbortController(); generating.value = true; generatingMsgId.value = msg.id;
                const msgIdx = messages.value.indexOf(msg), contents = getContents(msgIdx), retryCount = ref(0);
                let promptTxt = ''; for (let i = msgIdx - 1; i >= 0; i--) { if (messages.value[i].role === 'user') { promptTxt = messages.value[i].text || ''; break; } }
                while (true) {
                    const varIdx = msg.activeVariant, v = msg.variants[varIdx];
                    try { await streamToVariant(msgId, varIdx, contents, promptTxt, originatingConvId); break; }
                    catch (err) { if (!await handleStreamError(err, v, retryCount, () => { msg.variants.push(createVariant()); msg.activeVariant = msg.variants.length - 1; })) break; }
                }
                generating.value = false; generatingMsgId.value = null; abortCtrl.value = null;
            };

            const deleteMessage = (msgId) => {
                const msg = messages.value.find(m => m.id === msgId); if (!msg) return;
                if (msg.role === 'model' && msg.variants?.length > 1) {
                    const vi = msg.activeVariant; msg.variants.splice(vi, 1); msg.activeVariant = Math.min(vi, msg.variants.length - 1);
                    store.addToast({msg: 'Variant deleted', type: 'success', duration: 2000}); return;
                }
                const idx = messages.value.findIndex(m => m.id === msgId); if (idx !== -1) { messages.value.splice(idx, 1); store.addToast({msg: 'Message deleted', type: 'success', duration: 2000}); }
            };
            const deleteAllVariants = (msgId) => {
                const idx = messages.value.findIndex(m => m.id === msgId);
                if (idx !== -1) { messages.value.splice(idx, 1); store.addToast({msg: 'All variants deleted', type: 'success', duration: 2000}); }
            };
            const newChat = () => { 
                const newId = uid();
                conversations.value.unshift({id: newId, title: 'New Conversation', messages: [], gallery: []});
                activeConversationId.value = newId;
            };
            const abort = () => abortCtrl.value?.abort();

            // Initialize a chat if none exists
            if (!conversations.value.length) {
                newChat();
            } else if (!activeConversationId.value) {
                activeConversationId.value = conversations.value[0].id;
            }

            return {conversations, activeConversationId, messages, gallery, generating, generatingMsgId, sendMessage, regenerateMessage, deleteMessage, deleteAllVariants, newChat, selectConversation, renameConversation, deleteConversation, abort};
        });

        // --- ChatMessage Component ---
        const ChatMessage = {
            props: ['msg', 'editState'],
            emits: ['open-lightbox', 'update:editState', 'request-edit-upload', 'use-as-input'],
            setup(props, {emit}) {

                    store.addToast({msg: 'Message edited', type: 'success', duration: 2000});

                return {isGen, variant, isAwaitingContent, isEditing, imgSrc, fmtTokens, markdownParse, downloadImage,

                        regenerateMessage, deleteMessage, deleteAllVariants, emit};
            },
            template: `
<div v-if="msg.role === 'user'" class="chat chat-end group/umsg">

                const geminiConfig = store.config.value.gemini;
                const hasApiKey = computed(() => !!geminiConfig.apiKey);
                const aspectRatios = [
                    {val:'', text:'Auto'},
                    {val:'1:1', text:'1:1'}, {val:'16:9', text:'16:9'}, {val:'9:16', text:'9:16'},
                    {val:'4:3', text:'4:3'}, {val:'3:4', text:'3:4'}, {val:'3:2', text:'3:2'},

                ]);
                const imageSizeOpts = computed(() => imageSizes.map(s => ({label: s, active: geminiConfig.imageSize === s, onClick: () => geminiConfig.imageSize = s})));

                const scrollToBottom = () => nextTick(() => { if (chatEl.value) chatEl.value.scrollTo({top: chatEl.value.scrollHeight, behavior: 'smooth'}); });

                    const arr = files instanceof FileList ? Array.from(files) : [files];
                    const valid = arr.filter(f => f?.type.startsWith('image/'));
                    if (!valid.length) { store.addToast({msg: 'Please upload an image file', type: 'error'}); return; }

            history:createWebHashHistory(),
            routes,
            scrollBehavior: (to, from, savedPos) => savedPos || {top: 0, behavior: 'smooth'},
        });
        
        // --- Main App ---
        const App = {
            setup() {
                const store = useAppStore();
                const {notifications, resetNotificationNum, config, largeData} = store;
                const boxAPI = useBoxAPI();
                
                onMounted(async () => {
                    store.isHydrating.value = true;
                    await boxAPI.validateToken();
                    if (boxAPI.isReady.value) {
                        const loadedState = await boxAPI.loadState();
                        if (loadedState) {
                            // Merge loaded state directly into config and largeData
                            const { genHistory, conversations, box: _ignoredBox, ...rest } = loadedState;
                            if (genHistory) largeData.genHistory = genHistory;
                            if (conversations) largeData.conversations = conversations;
                            Object.assign(config.value, rest);
                            store.addToast({msg: 'Settings loaded from Box.', type: 'success', duration: 2000});
                        }
                    }
                    await nextTick();
                    store.isHydrating.value = false;
                });
                const navItems = computed(() => [
                    {path:'/gen', icon:'image', label:'NAI Image Generator', source: 'gen'},
                    {path:'/tagtest', icon:'lab_research', label:'NAI Tag Test', source: 'tagTest'},
                    {path: config.value.danbooru.lastPath || '/danbooru', icon:'package_2', label:'Danbooru Browser', source: 'danbooru'},
                    {path:'/banana', icon:'auto_awesome', label:'Nano Banana Studio', source: 'banana'}
                ]);

                useRouter().afterEach((to) => to.meta.genSource && resetNotificationNum(to.meta.genSource));

                return {navItems, notifications};
            },
            template:`
                <div class="flex h-screen animated-bg animate-gradientShift">
                    <nav class="z-50 p-2 glass border-r-0 flex flex-col">
                        <ul class="menu bg-transparent rounded-box p-0 space-y-2">
                            <li v-for="item in navItems" :key="item.path"><nav-link :to="item.path" :icon="item.icon" :notification="notifications[item.source]"></nav-link></li>
                        </ul>
                        <ul class="menu bg-transparent rounded-box p-0 mt-auto pt-2 border-t border-white/10">
                            <li><nav-link to="/settings" icon="settings"></nav-link></li>
                        </ul>
                    </nav>
                    <main class="flex-1 overflow-hidden"><router-view v-slot="{Component}"><keep-alive><component :is="Component" /></keep-alive></router-view></main>
                    <toast-container></toast-container>
                </div>
            `
        };
        
        const app = createApp(App);
        Object.entries({MaterialIcon, FloatingLabel, TagCountBadge, ChecklistDropdown, TagPill, IconBtn, SettingInput, Counter, SegmentedControl, SplitPane, LazyImage, AutocompleteField, CollapsiblePanel, PromptList, GenerationSettingsPanel, Placeholder, ImageViewer, ToastContainer, PromptInput, FolderDropdown, NavLink, ChatMessage, NanoBananaStudio}).forEach(([n, c]) => app.component(n, c));
        app.directive('focus', { mounted: el => el.focus() });
        app.use(router);
        app.mount('#app');
        window.__VUE_APP_MOUNTED__ = true;
    </script>
</body>
</html>
