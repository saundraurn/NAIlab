<body>
    <div id="app"></div>

    <script>
        const {createApp, ref, shallowRef, reactive, computed, onMounted, watch, nextTick, toRefs, toRef, provide, inject, onActivated, onDeactivated, onBeforeUnmount, getCurrentInstance, onScopeDispose} = Vue;
        const {createRouter, createWebHashHistory, useRoute, useRouter} = VueRouter;
        const {useLocalStorage, useSessionStorage, useFetch, createGlobalState, useAsyncState, useDebounceFn, onKeyStroke, useInfiniteScroll, useTextareaAutosize, useScroll, onClickOutside, useEventListener} = VueUse;
        
        const OPUS_DIMENSIONS=Object.freeze([[1024,1024],[960,1088],[1088,960],[896,1152],[1152,896],[832,1216],[1216,832],[768,1344],[1344,768],[704,1472],[1472,704],[640,1600],[1600,640],[576,1792],[1792,576],[512,2048],[2048,512]].map(([width,height])=>({width,height})));
        const DANBOORU_LIMIT = 100;
        const formatDisplayNum = (num) => num >= 1e6 ? +(num/1e6).toFixed(1)+'m' : num >= 1e3 ? +(num/1e3).toFixed(1)+'k' : (num || 0);
        const updateItemNum = (list, idRef, inc, max = 10) => inc > 0 && list.length < max ? list.push({id: idRef.value++, val: ''}) : inc < 0 && list.length > 1 && list.pop();
        const parsePrompt = (txt) => { const [p, n] = (txt || '').split('--'); return {positive: (p || '').trim(), negative: (n || '').trim()}; };
        const prepareGenConfig = (cfg) => (!cfg.isOpus || !cfg.shouldUseRandomOpusDimensions) ? {...cfg} : {...cfg, ..._.sample(OPUS_DIMENSIONS.filter(d => d.width <= cfg.width && d.height <= cfg.height))};

        // --- Global Utilities ---
        const uid = () => crypto.randomUUID();
        const imgSrc = (img) => img ? `data:${img.mimeType};base64,${img.data}` : '';
        const uint8ArrayToBase64 = (arr) => {
            let binary = '';
            const chunkSize = 8192;
            for (let i = 0; i < arr.length; i += chunkSize) {
                binary += String.fromCharCode.apply(null, arr.subarray(i, i + chunkSize));
            }
            return btoa(binary);
        };

        const WEBP_WORKER_CODE = `
            import encode from 'https://esm.sh/@jsquash/webp@0.1.4';
            self.onmessage = async (e) => {
                const { id, imageData } = e.data;
                try {
                    const webpData = new Uint8Array(await encode(imageData, { effort: 6, quality: 100 }));
                    self.postMessage({ id, webp: webpData }, [webpData.buffer]);
                } catch (error) {
                    self.postMessage({ id, error: error.message });
                }
            };
        `;
        let webpWorkerInstance = null;
        const getWebPWorker = () => {
            if (!webpWorkerInstance) {
                const blob = new Blob([WEBP_WORKER_CODE], { type: 'text/javascript' });
                webpWorkerInstance = new Worker(URL.createObjectURL(blob), { type: 'module' });
            }
            return webpWorkerInstance;
        };

        const blobToWebP = async (blob) => {
            const bitmap = await createImageBitmap(blob);
            const canvas = new OffscreenCanvas(bitmap.width, bitmap.height);
            const ctx = canvas.getContext('2d');
            ctx.drawImage(bitmap, 0, 0);
            const imageData = ctx.getImageData(0, 0, bitmap.width, bitmap.height);

            return new Promise((resolve, reject) => {
                const worker = getWebPWorker();
                const id = uid();
                const handler = (e) => {
                    if (e.data.id === id) {
                        worker.removeEventListener('message', handler);
                        if (e.data.error) reject(new Error(e.data.error));
                        else resolve(e.data.webp);
                    }
                };
                worker.addEventListener('message', handler);
                worker.postMessage({ id, imageData });
            });
        };

        const base64ToWebP = async (base64, mimeType) => {
            const res = await fetch(`data:${mimeType};base64,${base64}`);
            const blob = await res.blob();
            return await blobToWebP(blob);
        };
        const fmtTokens = (n) => !n ? '0' : n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
        const markdownCache = new Map();
        const markdownParse = (text) => {
            if (!text) return '';
            if (markdownCache.has(text)) return markdownCache.get(text);
            try { const r = window.marked ? window.marked.parse(text) : text; markdownCache.set(text, r); return r; } catch { return text; }
        };
        const readBase64 = (file) => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res({data: r.result.split(',')[1], mimeType: file.type, name: file.name}); r.onerror = rej; r.readAsDataURL(file); });
        const downloadImage = (src, name) => { const a = document.createElement('a'); a.href = src; a.download = name || 'gemini-'+Date.now()+'.webp'; document.body.appendChild(a); a.click(); a.remove(); };
        const abortableSleep = (ms, signal) => new Promise((resolve, reject) => {
            if (signal?.aborted) return reject(new DOMException('', 'AbortError'));
            const t = setTimeout(resolve, ms);
            signal?.addEventListener('abort', () => { clearTimeout(t); reject(new DOMException('', 'AbortError')); }, {once: true});
        });

        // --- Unified Application Store ---
        const useAppStore = createGlobalState(() => {
            const config = useLocalStorage('nai-app-settings', {
                tagTest: {iterations:1, isInfinite:false, isControl:true, prompts:[{id:1, val:'1girl, solo, wearing casual clothes'}], nextPromptId:2, unwantedContent:'multiple views, monochrome, black and white, looking at viewer, pov', tagsToTest:'sunset lighting\nwarm colors\nnight scene\nfog\nrain', tagPos:'beginning', tagTarget:'prompt', tagStrength:1.0, hasExtendedRange:false, areTagsVisible:false, shouldFilterMiddleResults:false},
                genConfig: {steps:28, width:768, height:1344, scale:5.7, sampler:'k_euler_ancestral', cfgRescale:0, noiseSchedule:'karras', skipCfgAboveSigma:0, isOpus:false, shouldUseRandomOpusDimensions:false},
                ui: {splitSizes:[60,40], splitSizesDanbooru:[40,60], splitSizesGen:[40,60], splitSizesBanana:[100,0], collapsibleStates:{'tag-test-settings':true, 'prompts-uc':true, 'tags-to-test':true, 'gen-settings':true, 'api-config':true, 'app-settings':true, 'img-comparison':true, 'results-panel':true, 'danbooru-search':true, 'danbooru-folders':true, 'nai-main-prompt':true, 'nai-char-prompts':true, 'nai-last-img':true, 'banana-settings':false}},
                app: {apiKey:'', model:'nai-diffusion-4-5-full'},
                gemini: {apiKey:'', thinkingLevel:'MINIMAL', aspectRatio:'1:1', imageSize:'1K', autoRetry:false},
                danbooru: {folders:[], nextFolderId:1, gridCols:4, lastPath:'/danbooru', blacklist:'', sortOrder:'id', ratingFilters:{g:true, s:true, q:true, e:true}, savedSearches:[{name:'Trending', prompt:'order:rank'}]},
                genState: {prompt:'1girl, solo, wearing casual clothes', uc:'multiple views, monochrome, black and white, looking at viewer, pov', charPrompts:[{id:1, val:''}], nextCharPromptId:2},
                jssync: {gistId:'', proxyUrl:'', proxyUrl2:'', includeApiKeys:false, autoSync:true, lastSyncedAt:null, lastPulledEtag:'', lastSyncedRevs:{}},
                _syncMeta: {tagTest:{updatedAt:0,rev:0}, genConfig:{updatedAt:0,rev:0}, genState:{updatedAt:0,rev:0}, app:{updatedAt:0,rev:0}, gemini:{updatedAt:0,rev:0}, danbooru:{updatedAt:0,rev:0}}
            }, {mergeDefaults: true});

            // Token held in sessionStorage only — never written to localStorage or synced to Gist
            const syncToken = useSessionStorage('nai-sync-token', '');

            // Guard flag: set true during remote merges so watchers don't stamp _syncMeta
            const isSyncMerging = ref(false);

            // Section-level watchers that stamp _syncMeta on any meaningful change
            const WATCHED_SECTIONS = ['tagTest', 'genConfig', 'genState', 'app', 'gemini', 'danbooru'];
            WATCHED_SECTIONS.forEach(section => {
                watch(() => config.value[section], () => {
                    if (isSyncMerging.value || !config.value._syncMeta) return;
                    const meta = config.value._syncMeta[section];
                    meta.rev = (meta.rev || 0) + 1;
                    meta.updatedAt = Date.now();
                }, {deep: true});
            });

            const toasts = ref([]), notifications = reactive({}), queue = ref([]), isDispatcherRunning = ref(false), isApiHalted = ref(false);
            let uniqueIdCounter = 0;

            const removeToast = (id) => _.remove(toasts.value, {id}).forEach(t => clearTimeout(t.timerId));
            const addToast = ({id, msg, type='info', source='default', duration=5000, persistent=false}) => {
                let item = id ? _.find(toasts.value, {id}) : (type === 'error' && _.findLast(toasts.value, {type, msg, source}));
                if (!item) toasts.value.push(item = reactive({id: id || ++uniqueIdCounter, count: 0}));
                Object.assign(item, {msg, type, source, persistent, duration, count: item.count + 1});
                clearTimeout(item.timerId); if (!persistent) item.timerId = setTimeout(() => removeToast(item.id), duration);
                return item.id;
            };
            
            const updateNotification = (src, n) => src && (notifications[src] = Math.max(0, n ? (notifications[src] || 0) + n : 0));
            const addReqs = (reqs) => {queue.value.push(...reqs.map(r => ({...r, id: ++uniqueIdCounter}))); startDispatcher();};
            const clearQueueBySource = (src) => _.remove(queue.value, {source: src});

            const generateImage = async (req, toastId) => {
                const {app} = config.value, {prompt, uc, seed, genConfig: cfg, charCaptions: cc, negativeCharCaptions: ncc, onStatusUpdate: upd} = req;
                if (!app.apiKey) return {success: false, msg: upd?.('Error: API Key is missing.')};
                const cleanKey = (app.apiKey || '').trim();
                const v4 = (base, c, o) => ({caption: {base_caption: base, char_captions: c||[]}, use_coords: false, use_order: o});
                const parameters = {...cfg, skip_cfg_above_sigma: +cfg.skipCfgAboveSigma || null, seed, uncond_scale: 0, n_samples: 1, v4_prompt: v4(prompt, cc, true), v4_negative_prompt: v4(uc, ncc, false), request_type: "PromptGenerateRequest", version: 1};
                
                for (let i = 1; i <= 5; i++) {
                    try {
                        const controller = new AbortController();
                        const id = setTimeout(() => controller.abort(), 90000);
                        const res = await fetch('https://image.novelai.net/ai/generate-image', {
                            method: 'POST',
                            headers: {'Authorization': `Bearer ${cleanKey}`, 'Content-Type': 'application/json'},
                            body: JSON.stringify({input: prompt, model: app.model, action: "generate", parameters}),
                            signal: controller.signal
                        });
                        clearTimeout(id);

                        if (res.ok) {
                            try { const u = fflate.unzipSync(new Uint8Array(await res.arrayBuffer())); return {success: true, blob: new Blob([u[Object.keys(u).find(f=>f.endsWith('.png'))]], {type: 'image/png'})}; } 
                            catch (e) { return {success: false, msg: upd?.(`Error: ${e.message}`)}; }
                        }
                        
                        if (res.status === 401) {isApiHalted.value = true; req.source && clearQueueBySource(req.source); return {success: false, msg: 'Invalid API Key.'};}
                        if (![429, 502, 503, 504].includes(res.status)) return {success: false, msg: upd?.(`Error ${res.status}`)};
                        
                        if (i === 5) return {success: false, msg: upd?.('Request timed out.')};
                        upd?.(`${res.status === 429 ? "Busy" : "Error"}, retrying... (${i}/5)`); toastId && addToast({id: toastId, msg: 'Retrying...', type: 'warning', persistent: true});
                        await new Promise(r => setTimeout(r, (2 ** (i - 1)) * 500 + Math.random() * 1500));
                    } catch (e) {
                        if (i === 5) return {success: false, msg: upd?.(e.name === 'AbortError' ? 'Request timed out.' : `Error: ${e.message}`)};
                        upd?.(`Network Error, retrying... (${i}/5)`); 
                        await new Promise(r => setTimeout(r, (2 ** (i - 1)) * 500 + Math.random() * 1500));
                    }
                }
            };

            const startDispatcher = async () => {
                if (isDispatcherRunning.value) return; isDispatcherRunning.value = true;
                try {
                    while (queue.value.length > 0 && !isApiHalted.value) {
                        const act = router?.currentRoute?.value?.meta?.genSource, idx = Math.max(0, act ? _.findIndex(queue.value, {source: act}) : -1), req = queue.value.splice(idx, 1)[0]; if (!req) continue;
                        const tId = addToast({msg: 'Generating...', type: 'loading', source: req.source, persistent: true});
                        const res = await generateImage(req, tId);
                        if (router?.currentRoute?.value?.meta?.genSource !== req.source && res.success) updateNotification(req.source, 1);
                        addToast({id: tId, msg: res.success ? 'Generated successfully!' : (res.msg || 'Gen failed'), type: res.success ? 'success' : 'error', persistent: false, duration: res.success ? 3000 : 6000});
                        req.callback?.(res.success ? null : new Error(res.msg), res.success ? {blob: res.blob, context: req.context} : {context: req.context});
                    }
                } finally {isDispatcherRunning.value = false;}
            };

            return {config, toasts, addToast, removeToast, notifications, resetNotificationNum: (src) => updateNotification(src, 0), queue, isDispatcherRunning, isApiHalted, addReqs, clearQueueBySource, startDispatcher, isSyncMerging, syncToken};
        });

        // --- Danbooru Fetch Utility (proxy-aware with automatic failover) ---
        const _proxyFailures = {};
        const danbooruFetch = async (url, options) => {
            const {jssync} = useAppStore().config.value;
            const proxies = [jssync.proxyUrl, jssync.proxyUrl2]
                .filter(p => p && (!_proxyFailures[p] || Date.now() - _proxyFailures[p] > 60000));
            for (const proxy of proxies) {
                const proxyUrl = `${proxy.replace(/\/$/, '')}/proxy?url=${encodeURIComponent(url)}`;
                try {
                    const res = await fetch(proxyUrl, options);
                    if (!res.ok) { _proxyFailures[proxy] = Date.now(); continue; }
                    return res;
                } catch { _proxyFailures[proxy] = Date.now(); }
            }
            return fetch(url, options); // direct fallback
        };

        // --- Image Store (LightningFS + isomorphic-git) ---
        const useImageStore = createGlobalState(() => {
            const store = useAppStore();
            let lfs = null;

            const init = async () => {
                lfs = new LightningFS('nailab-git');
                try {
                    await lfs.promises.stat('/.git');
                } catch (e) {
                    await window.git.init({ fs: lfs, dir: '/' });
                }
            };

            const saveImage = async (imageId, uint8Array) => {
                await lfs.promises.writeFile('/' + imageId, uint8Array);
            };

            const loadImage = async (imageId) => {
                try {
                    return await lfs.promises.readFile('/' + imageId);
                } catch (e) {
                    return null;
                }
            };

            const deleteImage = async (imageId) => {
                try {
                    await lfs.promises.unlink('/' + imageId);
                } catch (e) {}
            };

            const saveConversations = async (serialized) => {
                await lfs.promises.writeFile('/conversations.json', JSON.stringify(serialized));
            };

            const loadConversations = async () => {
                try {
                    const data = await lfs.promises.readFile('/conversations.json', 'utf8');
                    return JSON.parse(data);
                } catch (e) {
                    return null;
                }
            };

            const gitSync = async () => {
                const config = store.config.value;
                const token = store.syncToken.value;
                const { gistId, proxyUrl, proxyUrl2 } = config.jssync;
                if (!token || !gistId) return null;

                const primaryProxy = proxyUrl || proxyUrl2;
                if (!primaryProxy) {
                    console.warn('Image sync requires a Cloudflare Worker proxy.');
                    return null;
                }
                const pUrl = primaryProxy.replace(/\/$/, '') + '/git';
                const authParams = {
                    onAuth: () => ({ username: 'token', password: token }),
                    corsProxy: pUrl,
                    author: { name: 'NAILab', email: 'sync@nailab' }
                };

                try {
                    store.addToast({ msg: 'Syncing images...', type: 'info', duration: 2000, source: 'sync' });
                    try {
                        await lfs.promises.stat('/.git');
                        await window.git.pull({
                            fs: lfs, http: window.gitHttp, dir: '/',
                            ...authParams, singleBranch: true
                        });
                    } catch (e) {
                        // clone if no .git or pull fails drastically on empty repo
                        await window.git.clone({
                            fs: lfs, http: window.gitHttp, dir: '/',
                            url: 'https://gist.github.com/' + gistId + '.git',
                            depth: 1, ...authParams, singleBranch: true
                        });
                    }

                    const status = await window.git.statusMatrix({ fs: lfs, dir: '/' });
                    const changed = status.some(row => row[1] !== row[2] || row[2] !== row[3]);

                    if (changed) {
                        await window.git.add({ fs: lfs, dir: '/', filepath: '.' });
                        await window.git.commit({ fs: lfs, dir: '/', message: 'Update images', author: authParams.author });
                        await window.git.push({
                            fs: lfs, http: window.gitHttp, dir: '/',
                            ...authParams
                        });
                    }

                    const pFreshData = await loadConversations();
                    store.addToast({ msg: 'Image sync complete!', type: 'success', source: 'sync' });
                    return pFreshData;
                } catch (e) {
                    store.addToast({ msg: 'Image sync failed — remote may have new changes. Try syncing again.', type: 'error', duration: 5000, source: 'sync' });
                    return null;
                }
            };

            return { init, saveImage, loadImage, deleteImage, saveConversations, loadConversations, gitSync, getLfs: () => lfs };
        });

        // --- Sync Store (GitHub Gist REST API) ---
        const useSyncStore = createGlobalState(() => {
            const isSyncing = ref(false);
            const syncError = ref(null);
            const syncStatus = ref('idle'); // 'idle'|'pulling'|'pushing'|'conflict'|'error'
            const pendingConflict = ref(null); // { local, remote }

            // Merge helper: replaces arrays wholesale instead of merging element-by-index
            const mergeWithArrayReplace = (obj, src) =>
                _.mergeWith({}, obj, src, (_objVal, srcVal) => _.isArray(srcVal) ? _.cloneDeep(srcVal) : undefined);

            const SYNCED_SECTIONS = ['tagTest', 'genConfig', 'genState', 'app', 'gemini', 'danbooru', '_syncMeta'];
            const GIST_FILENAME = 'nailab-config.json';

            const getHeaders = (token) => ({
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28'
            });

            const extractSyncPayload = (fullConfig, includeApiKeys) => {
                const snap = {};
                SYNCED_SECTIONS.forEach(k => { if (fullConfig[k]) snap[k] = _.cloneDeep(fullConfig[k]); });
                if (!includeApiKeys) {
                    if (snap.app) delete snap.app.apiKey;
                    if (snap.gemini) delete snap.gemini.apiKey;
                }
                return snap;
            };

            const createGist = async (token, content) => {
                const res = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: getHeaders(token),
                    body: JSON.stringify({ description: 'NAILab Config Sync', public: false, files: { [GIST_FILENAME]: { content } } })
                });
                if (!res.ok) throw new Error(`Failed to create Gist: ${res.status}`);
                return res.json();
            };

                                <collapsible-panel title="Image Comparison" storage-key="img-comparison"><template #actions><label class="label cursor-pointer p-0 gap-2" @click.stop><span class="label-text text-xs text-neutral-400">Show Tags</span><input v-model="tagTest.areTagsVisible" type="checkbox" class="toggle toggle-xs toggle-primary" /></label></template>
                                    <div class="text-center text-neutral-300 mb-4"><p class="font-semibold">{{actionStatusMsg}}</p><p class="text-sm">{{progressText}}</p></div>
                                    <transition name="fade"><div v-if="shouldShowComparisonUI" class="space-y-3"><div class="grid grid-cols-2 gap-3"><div v-for="(image, key) in [{url: currentImages.imageA, tag: currentImages.tagA, name: 'A'}, {url: currentImages.imageB, tag: currentImages.tagB, name: 'B'}]" :key="key"><div class="glass rounded-lg p-3 aspect-square flex items-center justify-center min-w-[256px]"><image-viewer :src="image.url" :alt="'Image '+image.name" :text="'Image '+image.name"></image-viewer></div><div v-if="tagTest.areTagsVisible" class="text-center mt-1.5 text-neutral-300">{{image.tag}}</div></div></div><div class="space-y-2.5"><div class="grid grid-cols-2 gap-2.5"><button @click="recordJudgement('A')" :disabled="!(currentImages.imageA && currentImages.imageB)" class="btn btn-primary">I prefer Image A</button><button @click="recordJudgement('B')" :disabled="!(currentImages.imageA && currentImages.imageB)" class="btn btn-primary">I prefer Image B</button></div><button @click="recordJudgement('skip')" :disabled="!(currentImages.imageA && currentImages.imageB)" class="btn btn-neutral w-full">Skip</button></div></div></transition>
                                </collapsible-panel>
                                <collapsible-panel title="Results" storage-key="results-panel"><template #actions><label class="label cursor-pointer p-0 gap-2" @click.stop><span class="label-text text-xs text-neutral-400">Hide Middle</span><input v-model="tagTest.shouldFilterMiddleResults" type="checkbox" class="toggle toggle-xs toggle-primary" /></label></template>
                                    <transition-group tag="div" name="list" class="space-y-2 mb-4"><div v-for="result in formattedResults" :key="result.name" class="flex items-center gap-2"><div class="w-20 text-neutral-100 text-sm truncate">{{result.name}}</div><div class="flex-1 rounded-full h-4 relative bg-neutral-800 overflow-hidden"><div :style="{width: result.score + '%'}" class="h-full bg-gradient-to-r from-warning to-primary transition-[width] duration-[400ms] ease-out"></div><div class="absolute inset-0 flex items-center justify-center text-neutral-100 text-xs font-medium">{{result.score}}%</div></div><div class="text-xs text-neutral-400">{{result.tests}} tests</div></div></transition-group>
                                    <div class="overflow-x-auto max-h-48 custom-scroll"><table class="table table-sm"><thead><tr><th>Tag</th><th>Score</th><th>W/L</th><th>Skips</th></tr></thead><tbody><tr v-for="result in formattedResults" :key="result.name"><td>{{result.name}}</td><td>{{result.score}}%</td><td>{{result.wins}}/{{result.losses}}</td><td>{{result.skips}}</td></tr></tbody></table></div>
                                </collapsible-panel>
                            </template>
                        </split-pane></div></div>`
        }
        
        // --- Conversation Serialization format ---
        const serializeConversation = async (messages, gallery) => {
            const imageStore = useImageStore();
            const serializedMessages = await Promise.all(messages.map(async (msg) => {
                const sMsg = { ...msg };

                if (sMsg.images && sMsg.images.length > 0) {
                    sMsg.images = await Promise.all(sMsg.images.map(async (img, idx) => {
                        if (!img.imageId && img.data) {
                            // If user image isn't WebP yet, we must convert it and mutate the original object in memory
                            // so it doesn't get processed again on the next debounce.
                            let webpBytes;
                            if (img.mimeType === 'image/webp') {
                                // If already webp, just decode base64 to bytes
                                const binStr = atob(img.data);
                                webpBytes = new Uint8Array(binStr.length);
                                for (let i = 0; i < binStr.length; i++) webpBytes[i] = binStr.charCodeAt(i);
                            } else {
                                webpBytes = await base64ToWebP(img.data, img.mimeType);
                                img.data = uint8ArrayToBase64(webpBytes);
                                img.mimeType = 'image/webp';
                            }
                            img.imageId = 'img_' + uid() + '.webp';
                            await imageStore.saveImage(img.imageId, webpBytes);
                        }
                        return { id: img.id, imageId: img.imageId, mimeType: 'image/webp', name: img.name, hidden: img.hidden };
                    }));
                }

                if (sMsg.variants && sMsg.variants.length > 0) {
                    sMsg.variants = await Promise.all(sMsg.variants.map(async (v) => {
                        const sV = { ...v, _images: v._images.map(img => ({ mimeType: img.mimeType, imageId: img.imageId })) };
                        let inlineDataCount = 0;
                        sV.parts = await Promise.all(v.parts.map(async (part) => {
                            if (part.inlineData) {
                                let imageId = v._images[inlineDataCount]?.imageId;
                                if (!imageId) {
                                    const webpBytes = await base64ToWebP(part.inlineData.data, part.inlineData.mimeType);
                                    imageId = 'img_' + uid() + '.webp';
                                    await imageStore.saveImage(imageId, webpBytes);

                                    // Mutate the live array so it doesn't get regenerated on the next debounce save
                                    if (v._images[inlineDataCount]) {
                                        v._images[inlineDataCount].imageId = imageId;
                                    }
                                }
                                inlineDataCount++;
                                return { ...part, inlineData: undefined, _imageRef: imageId, _mimeType: 'image/webp' };
                            }
                            return part;
                        }));
                        return sV;
                    }));
                }
                return sMsg;
            }));

            const serializedGallery = gallery.map(item => ({ id: item.id, mimeType: item.mimeType, prompt: item.prompt, timestamp: item.timestamp, imageId: item.imageId }));
            return { messages: serializedMessages, gallery: serializedGallery };
        };

        const deserializeConversation = async (serializedData) => {
            if (!serializedData) return { messages: [], gallery: [] };
            const imageStore = useImageStore();
            const messages = await Promise.all((serializedData.messages || []).map(async (msg) => {
                const dMsg = { ...msg };

                if (dMsg.images && dMsg.images.length > 0) {
                    dMsg.images = await Promise.all(dMsg.images.map(async (img) => {
                        const dImg = { ...img };
                        if (dImg.imageId) {
                            const bytes = await imageStore.loadImage(dImg.imageId);
                            if (bytes) {
                                dImg.data = uint8ArrayToBase64(bytes);
                            } else {
                                dImg.data = null;
                            }
                        }
                        return dImg;
                    }));
                }

                if (dMsg.variants && dMsg.variants.length > 0) {
                    dMsg.variants = await Promise.all(dMsg.variants.map(async (v) => {
                        const dV = { ...v };
                        dV.parts = await Promise.all(v.parts.map(async (part) => {
                            if (part._imageRef) {
                                const bytes = await imageStore.loadImage(part._imageRef);
                                if (bytes) {
                                    return { ...part, inlineData: { data: uint8ArrayToBase64(bytes), mimeType: part._mimeType || 'image/webp' }, _imageRef: undefined, _mimeType: undefined };
                                } else {
                                    console.warn(`Missing image data for ${part._imageRef}`);
                                    return { ...part, _imageRef: undefined, _mimeType: undefined };
                                }
                            }
                            return part;
                        }));
                        dV._images = await Promise.all((v._images || []).map(async (img) => {
                            if (img.imageId) {
                                const bytes = await imageStore.loadImage(img.imageId);
                                return { ...img, data: bytes ? uint8ArrayToBase64(bytes) : null };
                            }
                            return img;
                        }));
                        return dV;
                    }));
                }
                return dMsg;
            }));

            const gallery = await Promise.all((serializedData.gallery || []).map(async (item) => {
                if (item.imageId) {
                    const bytes = await imageStore.loadImage(item.imageId);
                    return { ...item, data: bytes ? uint8ArrayToBase64(bytes) : null };
                }
                return item;
            }));

            return { messages, gallery };
        };

        // --- Gemini API Composable ---
        const CANDIDATE_BLOCK_REASONS = new Set(['SAFETY','IMAGE_SAFETY','IMAGE_PROHIBITED_CONTENT','PROHIBITED_CONTENT','RECITATION','IMAGE_RECITATION','OTHER','IMAGE_OTHER','NO_IMAGE','BLOCKLIST','SPII']);
        const TERMINAL_FINISH_REASONS = new Set(['LANGUAGE','MODEL_ARMOR']);

        const useGeminiAPI = createGlobalState(() => {
            const store = useAppStore();
            const messages = ref([]);
            const gallery = ref([]);
            const generating = ref(false);
            const generatingMsgId = ref(null);
            const abortCtrl = ref(null);
            const isHydrating = ref(false);
            const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview';

            const imageStore = useImageStore();
            const debouncedSaveConversation = useDebounceFn(async () => {
                if (isHydrating.value) return;
                const serialized = await serializeConversation(messages.value, gallery.value);
                await imageStore.saveConversations(serialized);
            }, 2000);

            const initFromStorage = async () => {
                isHydrating.value = true;
                const stored = await imageStore.loadConversations();
                if (stored) {
                    const deserialized = await deserializeConversation(stored);
                    messages.value = deserialized.messages;
                    gallery.value = deserialized.gallery;
                }
                isHydrating.value = false;
            };

            watch(messages, debouncedSaveConversation, { deep: true });
            watch(gallery, debouncedSaveConversation, { deep: true });

            const createVariant = () => reactive({id: uid(), parts: [], _thinking: '', _text: '', _images: [], _usage: null, _error: null, _blockReason: null, _isPromptBlock: false, timestamp: null});

            const getMsgParts = (msg) => {
                if (msg.role === 'model' && msg.variants) { const v = msg.variants[msg.activeVariant] ?? msg.variants[0]; return v ? v.parts : []; }
                const parts = [];
                for (const img of (msg.images || [])) { if (!img.hidden && img.data) parts.push({inlineData: {data: img.data, mimeType: img.mimeType}}); }
                if (msg.text) parts.push({text: msg.text});
                return parts;
            };
            const buildBody = (contents) => {
                const cfg = store.config.value.gemini;
                const genCfg = {responseModalities: ['TEXT','IMAGE'], thinkingConfig: {thinkingLevel: cfg.thinkingLevel, includeThoughts: cfg.thinkingLevel === 'HIGH'}};
                const imgCfg = {};
                if (cfg.aspectRatio && cfg.aspectRatio !== 'auto') imgCfg.aspectRatio = cfg.aspectRatio;
                if (cfg.imageSize) imgCfg.imageSize = cfg.imageSize;
                if (Object.keys(imgCfg).length) genCfg.imageConfig = imgCfg;
                return {contents, generationConfig: genCfg};
            };
            const getContents = (endIdx) => messages.value.slice(0, endIdx).filter(m => !m.hidden).map(m => ({role: m.role, parts: getMsgParts(m)}));

            async function* parseSSE(res) {
                const reader = res.body.getReader(), dec = new TextDecoder(); let buf = '';
                while (true) {
                    const {done, value} = await reader.read(); if (done) break;
                    buf += dec.decode(value, {stream: true}); let idx;
                    while ((idx = buf.indexOf('\n')) !== -1) {
                        const line = buf.substring(0, idx).trim(); buf = buf.substring(idx + 1);
                        if (line.startsWith('data: ')) { const d = line.substring(6); if (d === '[DONE]') return; try { yield JSON.parse(d); } catch {} }
                    }
                }
            }
            const extractDisplay = (parts) => {
                let thinking = '', text = ''; const images = [];
                for (const p of parts) { if (p.thought && p.text) thinking += p.text; else if (p.text) text += p.text; if (p.inlineData) images.push({mimeType: p.inlineData.mimeType, data: p.inlineData.data}); }
                return {thinking, text, images};
            };

            const streamToVariant = async (msgId, varIdx, contents, promptTxt) => {
                const getV = () => messages.value.find(m => m.id === msgId)?.variants[varIdx];
                const res = await fetch(`${API_BASE}:streamGenerateContent?alt=sse`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','x-goog-api-key': store.config.value.gemini.apiKey},
                    body: JSON.stringify(buildBody(contents)), signal: abortCtrl.value.signal
                });
                if (!res.ok) {
                    const errData = await res.json().catch(() => null);
                    const msg = errData?.error?.message || `HTTP ${res.status}`;
                    const e = new Error(msg); e.status = res.status;
                    if ([429, 500, 502, 503, 504].includes(res.status)) e.isRetryable = true;
                    if (res.status === 400 && /quota|resource.?exhausted/i.test(msg)) e.isRetryable = true;
                    throw e;
                }
                const allParts = []; let finalFinishReason = null;
                for await (const chunk of parseSSE(res)) {
                    if (chunk.promptFeedback?.blockReason) {
                        const e = new Error(`Prompt blocked: ${chunk.promptFeedback.blockReason}`);
                        e.isPromptBlock = true; e.blockReason = chunk.promptFeedback.blockReason; throw e;
                    }
                    const cand = chunk.candidates?.[0];
                    if (cand?.content?.parts) for (const p of cand.content.parts) allParts.push(p);
                    if (cand?.finishReason) finalFinishReason = cand.finishReason;
                    const disp = extractDisplay(allParts), v = getV();
                    if (v) { v._thinking = disp.thinking; v._text = disp.text; v._images = disp.images; if (chunk.usageMetadata) v._usage = chunk.usageMetadata; }
                }
                if (CANDIDATE_BLOCK_REASONS.has(finalFinishReason)) { const e = new Error(`Output blocked: ${finalFinishReason}`); e.isCandidateBlock = true; e.blockReason = finalFinishReason; throw e; }
                if (TERMINAL_FINISH_REASONS.has(finalFinishReason)) { const e = new Error(`Generation stopped: ${finalFinishReason}`); e.isTerminal = true; e.blockReason = finalFinishReason; throw e; }
                const v = getV();
                if (!v?._images?.length) { const reason = finalFinishReason || 'EMPTY'; const e = new Error(v?._text ? `No image generated (${reason})` : `Empty response (${reason})`); e.isCandidateBlock = true; e.blockReason = reason; throw e; }
                if (v) {
                    let inlineDataCount = 0;
                    for (let i = 0; i < allParts.length; i++) {
                        if (allParts[i].inlineData) {
                            const webpBytes = await base64ToWebP(allParts[i].inlineData.data, allParts[i].inlineData.mimeType);
                            const imageId = 'img_' + uid() + '.webp';
                            await imageStore.saveImage(imageId, webpBytes);
                            allParts[i].inlineData.data = uint8ArrayToBase64(webpBytes);
                            allParts[i].inlineData.mimeType = 'image/webp';
                            v._images[inlineDataCount].data = allParts[i].inlineData.data;
                            v._images[inlineDataCount].mimeType = 'image/webp';
                            v._images[inlineDataCount].imageId = imageId;
                            inlineDataCount++;
                        }
                    }

                    v.parts = allParts;
                    v.timestamp = Date.now();
                    for (const img of v._images) {
                        gallery.value.push({id: uid(), mimeType: img.mimeType, data: img.data, prompt: promptTxt, timestamp: Date.now(), imageId: img.imageId});
                    }
                }
            };

            // Shared retry-loop error handler — returns true to continue, false to break
            const handleStreamError = async (err, v, retryCount, onNewVariant) => {
                if (err.name === 'AbortError') { if (v) { v._error = 'Request cancelled.'; v.timestamp = Date.now(); } return false; }
                if (err.isRetryable && retryCount.value < 6) {
                    retryCount.value++;
                    const delay = Math.min(Math.pow(2, retryCount.value) * 500 + Math.random() * 500, 30000);
                    store.addToast({msg: `${err.status === 429 ? 'Rate limited' : 'Server error'}, retrying (${retryCount.value}/6)…`, type: 'warning', duration: delay + 500});
                    try { await abortableSleep(delay, abortCtrl.value?.signal); } catch { if (v) { v._error = 'Request cancelled.'; v.timestamp = Date.now(); } return false; }
                    return true;
                }
                if (err.isTerminal) { if (v) { v._error = `Stopped: ${err.blockReason}`; v._blockReason = err.blockReason; v.timestamp = Date.now(); } store.addToast({msg: `Generation stopped: ${err.blockReason}`, type: 'error'}); return false; }
                if (err.isPromptBlock) { if (v) { v._error = err.message; v._blockReason = err.blockReason; v._isPromptBlock = true; v.timestamp = Date.now(); } store.addToast({msg: err.message, type: 'error'}); return false; }
                if (err.isCandidateBlock) {
                    if (v) { v._error = err.message; v._blockReason = err.blockReason; v.timestamp = Date.now(); }
                    if (store.config.value.gemini.autoRetry) { store.addToast({msg: `Blocked (${err.blockReason}), retrying…`, type: 'warning', duration: 1500}); onNewVariant(); retryCount.value = 0; return true; }
                    return false;
                }
                if (v) { v._error = err.message || 'Unknown error'; v.timestamp = Date.now(); }
                store.addToast({msg: err.message || 'Generation failed', type: 'error'}); return false;
            };

            const sendMessage = async (text, imgs, scrollFn) => {
                if (!text && !imgs.length) return;
                if (!store.config.value.gemini?.apiKey) { store.addToast({msg: 'Set your Gemini API key in Settings', type: 'error'}); return; }
                if (generating.value) return;
                const userMsg = reactive({id: uid(), role: 'user', images: imgs.map(i => ({id: uid(), data: i.data, mimeType: i.mimeType, name: i.name, hidden: false})), text: text || '', hidden: false, timestamp: Date.now()});
                messages.value.push(userMsg);
                const modelMsg = reactive({id: uid(), role: 'model', hidden: false, variants: [createVariant()], activeVariant: 0});
                messages.value.push(modelMsg);
                abortCtrl.value = new AbortController();
                generating.value = true; generatingMsgId.value = modelMsg.id; scrollFn?.();
                const modelIdx = messages.value.indexOf(modelMsg), contents = getContents(modelIdx), retryCount = ref(0);
                while (true) {
                    const varIdx = modelMsg.activeVariant, v = modelMsg.variants[varIdx];
                    try { await streamToVariant(modelMsg.id, varIdx, contents, text); break; }
                    catch (err) { if (!await handleStreamError(err, v, retryCount, () => { modelMsg.variants.push(createVariant()); modelMsg.activeVariant = modelMsg.variants.length - 1; })) break; }
                }
                generating.value = false; generatingMsgId.value = null; abortCtrl.value = null; scrollFn?.();
            };

            const regenerateMessage = async (msgId) => {
                const msg = messages.value.find(m => m.id === msgId);
                if (!msg || msg.role !== 'model' || generating.value) return;
                if (!store.config.value.gemini?.apiKey) { store.addToast({msg: 'Set your Gemini API key first', type: 'error'}); return; }
                msg.variants.push(createVariant()); msg.activeVariant = msg.variants.length - 1;
                abortCtrl.value = new AbortController(); generating.value = true; generatingMsgId.value = msg.id;
                const msgIdx = messages.value.indexOf(msg), contents = getContents(msgIdx), retryCount = ref(0);
                let promptTxt = ''; for (let i = msgIdx - 1; i >= 0; i--) { if (messages.value[i].role === 'user') { promptTxt = messages.value[i].text || ''; break; } }
                while (true) {
                    const varIdx = msg.activeVariant, v = msg.variants[varIdx];
                    try { await streamToVariant(msgId, varIdx, contents, promptTxt); break; }
                    catch (err) { if (!await handleStreamError(err, v, retryCount, () => { msg.variants.push(createVariant()); msg.activeVariant = msg.variants.length - 1; })) break; }
                }
                generating.value = false; generatingMsgId.value = null; abortCtrl.value = null;
            };

            const deleteMessage = (msgId) => {
                const msg = messages.value.find(m => m.id === msgId); if (!msg) return;
                if (msg.role === 'model' && msg.variants?.length > 1) {
                    const vi = msg.activeVariant; msg.variants.splice(vi, 1); msg.activeVariant = Math.min(vi, msg.variants.length - 1);
                    store.addToast({msg: 'Variant deleted', type: 'success', duration: 2000}); return;
                }
                const idx = messages.value.findIndex(m => m.id === msgId); if (idx !== -1) { messages.value.splice(idx, 1); store.addToast({msg: 'Message deleted', type: 'success', duration: 2000}); }
            };
            const deleteAllVariants = (msgId) => {
                const idx = messages.value.findIndex(m => m.id === msgId);
                if (idx !== -1) { messages.value.splice(idx, 1); store.addToast({msg: 'All variants deleted', type: 'success', duration: 2000}); }
            };
            const newChat = () => { messages.value = []; gallery.value = []; imageStore.saveConversations({messages:[], gallery:[]}); };
            const abort = () => abortCtrl.value?.abort();

            return {messages, gallery, generating, generatingMsgId, sendMessage, regenerateMessage, deleteMessage, deleteAllVariants, newChat, abort, initFromStorage, isHydrating};
        });

        // --- ChatMessage Component ---
        const ChatMessage = {
            props: ['msg', 'editState'],
            emits: ['open-lightbox', 'update:editState', 'request-edit-upload', 'use-as-input'],
            setup(props, {emit}) {
                const store = useAppStore();
                const {generating, generatingMsgId, regenerateMessage, deleteMessage, deleteAllVariants} = useGeminiAPI();

                const isGen = computed(() => generatingMsgId.value === props.msg.id);
                const variant = computed(() => props.msg.variants?.[props.msg.activeVariant] ?? props.msg.variants?.[0] ?? null);
                const isAwaitingContent = computed(() => isGen.value && !variant.value?._text && !variant.value?._error && !variant.value?._images?.length);
                const isEditing = computed(() => props.editState?.msgId === props.msg.id);

                const toggleHide = () => { props.msg.hidden = !props.msg.hidden; store.addToast({msg: props.msg.hidden ? 'Hidden from model' : 'Visible to model', type: 'success', duration: 2000}); };
                const toggleHideImage = (imgId) => { const img = props.msg.images?.find(i => i.id === imgId); if (img) { img.hidden = !img.hidden; store.addToast({msg: img.hidden ? 'Image hidden from model' : 'Image shown to model', type: 'success', duration: 1500}); } };
                const deleteImage = (imgId) => { if (!props.msg.images) return; const i = props.msg.images.findIndex(x => x.id === imgId); if (i !== -1) props.msg.images.splice(i, 1); };
                const navigateVariant = (dir) => { const m = props.msg; m.activeVariant = Math.max(0, Math.min(m.variants.length - 1, m.activeVariant + dir)); };
                const startEdit = () => emit('update:editState', {msgId: props.msg.id, text: props.msg.text || '', images: (props.msg.images || []).map(i => ({...i}))});
                const saveEdit = () => {
                    const es = props.editState; if (!es) return;
                    const t = es.text.trim();
                    if (!t && !es.images.length) { store.addToast({msg: 'Message cannot be empty', type: 'error'}); return; }
                    props.msg.text = t; props.msg.images = es.images;
                    emit('update:editState', null);
                    store.addToast({msg: 'Message edited', type: 'success', duration: 2000});
                };

                return {isGen, variant, isAwaitingContent, isEditing, imgSrc, fmtTokens, markdownParse, downloadImage,
                        toggleHide, toggleHideImage, deleteImage, navigateVariant, startEdit, saveEdit,
                        regenerateMessage, deleteMessage, deleteAllVariants, emit};
            },
            template: `
<div v-if="msg.role === 'user'" class="chat chat-end group/umsg">
  <div class="chat-image avatar">
    <div class="w-8 h-8 rounded-full bg-primary/15 border border-primary/20 flex items-center justify-center shrink-0">
      <material-icon icon="person" :size="16" class="text-primary/70"></material-icon>
    </div>
  </div>
  <div v-if="isEditing" class="chat-bubble bubble-user max-w-[90%] p-3 space-y-2.5">
    <textarea v-model="editState.text" class="textarea textarea-bordered w-full text-sm min-h-[64px] bg-base-100/40 resize-none leading-relaxed" rows="3" @keydown.ctrl.enter.prevent="saveEdit"></textarea>
    <div class="flex flex-wrap gap-1.5">
      <div v-for="(img, i) in editState.images" :key="img.id" class="relative group/eimg shrink-0">
        <img :src="imgSrc(img)" class="h-14 w-14 object-cover rounded-lg border border-white/20 block">
        <button @click="editState.images.splice(i, 1)" class="absolute -top-1.5 -right-1.5 btn btn-xs btn-circle btn-error min-h-0 h-5 w-5 p-0 opacity-0 group-hover/eimg:opacity-100 transition-opacity shadow-sm">
          <material-icon icon="close" :size="10"></material-icon>
        </button>
      </div>
      <button @click="emit('request-edit-upload')" class="h-14 w-14 shrink-0 rounded-lg border-2 border-dashed border-white/20 flex items-center justify-center text-neutral-500 hover:text-neutral-300 hover:border-white/40 transition-colors">
        <material-icon icon="add_photo_alternate" :size="20"></material-icon>
      </button>
    </div>
    <div class="flex gap-2 justify-end">
      <button @click="saveEdit" class="btn btn-primary btn-xs shadow-sm">Save</button>
      <button @click="emit('update:editState', null)" class="btn btn-ghost btn-xs">Cancel</button>

                                    <nav-link to="/settings" icon="settings"></nav-link>
                                </div>
                            </li>
                        </ul>
                    </nav>
                    <main class="flex-1 overflow-hidden"><router-view v-slot="{Component}"><keep-alive><component :is="Component" /></keep-alive></router-view></main>
                    <toast-container></toast-container>
                    <conflict-resolution-modal></conflict-resolution-modal>
                </div>
            `
        };
        
        const app = createApp(App);
        Object.entries({MaterialIcon, FloatingLabel, TagCountBadge, ChecklistDropdown, TagPill, IconBtn, SettingInput, Counter, SegmentedControl, SplitPane, LazyImage, AutocompleteField, CollapsiblePanel, PromptList, GenerationSettingsPanel, Placeholder, ImageViewer, ToastContainer, PromptInput, FolderDropdown, NavLink, ChatMessage, NanoBananaStudio, ConflictResolutionModal}).forEach(([n, c]) => app.component(n, c));
        app.use(router);
        app.mount('#app');
    </script>
</body>
</html>
